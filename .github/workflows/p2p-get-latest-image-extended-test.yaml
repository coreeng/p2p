on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      slack_webhook_url:
        required: false
    outputs:
      version:
        description: "The latest image in the registry"
        value: ${{ jobs.get-latest-version.outputs.version }}
    inputs:
      environment:
        required: false
        type: string
        default: ${{ vars.EXTENDED_TEST }}
      dry-run:
        required: false
        type: boolean
        default: false
      main-branch:
        required: false
        type: string
        default: 'refs/heads/main'
      working-directory:
        required: false
        type: string
        default: '.'
      registry-path:
        required: false
        type: string
        default: 'extended-test'
      tenant-name:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      region:
        required: false
        type: string
        default: europe-west2

jobs:
  get-latest-version:
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    if: success() && (github.ref == inputs.main-branch )
    secrets:
      env_vars: ${{ secrets.env_vars }}
    strategy:
      matrix: ${{ fromJSON(inputs.environment) }}
      fail-fast: false
    with:
      environment: ${{ inputs.environment }}
      registry-path: ${{ inputs.registry-path }}
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ inputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      region: ${{ inputs.region }}

  notify-failure:
    needs: [get-latest-version]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "P2P get-latest-image (extended-test) failed"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
