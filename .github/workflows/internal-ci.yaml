name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  increment-version:
    uses: ./.github/workflows/internal-version.yaml
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true

  print-version:
    runs-on: ubuntu-24.04
    needs: increment-version
    steps:
      - env:
          VERSION: ${{needs.increment-version.outputs.version}}
        id: step1
        run: echo "The Next Version is $VERSION"

  test_version:
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
      version-prefix: app-tag
    uses: ./.github/workflows/p2p-version.yaml

  test_version_default :
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
    uses: ./.github/workflows/p2p-version.yaml

  test_execute_command:
    needs: [test_version]
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      command: test-var-print
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_fastfeedback:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-fastfeedback.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_source_security_scan:
    uses: ./.github/workflows/p2p-workflow-source-security-scan.yaml
    with:
      scope: changes
      blocking-severity: off
      dry-run: true
      timeout-minutes: 10

  test_image_scan:
    needs: [test_version]
    strategy:
      matrix:
        pipeline-stage: [fast-feedback, extended-test, prod]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      pipeline-stage: ${{ matrix.pipeline-stage }}
      version: ${{ needs.test_version.outputs.version }}

  test_image_ref_resolution:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test image reference resolver
        run: |
          python3 .github/scripts/extract-workflow-scripts.py \
            --workflow .github/workflows/p2p-workflow-image-scan.yaml \
            --out-dir /tmp \
            --step resolve-images=resolve-image-refs.js \
            --require resolve-images=IMAGE_NAMES \
            --require resolve-images=standardRefs \
            --require resolve-images=core.setFailed

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const vm = require('vm');

          const resolverScript = fs.readFileSync('/tmp/resolve-image-refs.js', 'utf8');

          async function runCase(name, makeOutputs, envOverrides = {}) {
            const calls = [];
            const outputs = {};
            const infos = [];
            const failures = [];
            const make = (target) => makeOutputs[target] ?? null;

            const sandbox = {
              process: {
                env: {
                  PIPELINE_STAGE: 'fast-feedback',
                  REGION: 'europe-west2',
                  PROJECT_ID: 'project-a',
                  TENANT_NAME: 'tenant-a',
                  VERSION: '1.2.3',
                  WORKING_DIR: '/repo',
                  ...envOverrides,
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                info: (message) => { infos.push(message); },
                setFailed: (message) => { failures.push(message); },
              },
              require: (moduleName) => {
                if (moduleName !== 'child_process') {
                  return require(moduleName);
                }
                return {
                  execFileSync(command, args, options) {
                    calls.push({ command, args, cwd: options.cwd });
                    assert.strictEqual(command, 'make', `${name}: command`);
                    const target = args[args.length - 1];
                    if (args.includes('-q')) {
                      if (Object.prototype.hasOwnProperty.call(makeOutputs, target)) {
                        return '';
                      }
                      const error = new Error(`No rule to make target '${target}'`);
                      error.status = 2;
                      throw error;
                    }
                    const output = make(target);
                    if (output === null) {
                      const error = new Error(`No rule to make target '${target}'`);
                      error.status = 2;
                      throw error;
                    }
                    return output;
                  },
                };
              },
            };

            await vm.runInNewContext(`(async () => {\n${resolverScript}\n})()`, sandbox);
            return { calls, outputs, infos, failures };
          }

          (async () => {
          const fallback = await runCase('missing image-names falls back', {
            'p2p-images': 'api ui\n',
          });
          assert.deepStrictEqual(fallback.failures, [], 'missing image-names falls back: no failures');
          assert.deepStrictEqual(
            fallback.outputs['image-refs'].split('\n'),
            [
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/api:1.2.3',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/ui:1.2.3',
            ],
          );

          const inputImages = await runCase(
            'image-names input wins',
            { 'p2p-images': 'also-not-used\n' },
            { IMAGE_NAMES: 'api,ui\nworker' },
          );
          assert.deepStrictEqual(inputImages.failures, [], 'image-names input wins: no failures');
          assert.deepStrictEqual(
            inputImages.outputs['image-refs'].split('\n'),
            [
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/api:1.2.3',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/ui:1.2.3',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/worker:1.2.3',
            ],
          );
          assert.deepStrictEqual(inputImages.calls, [], 'image-names input wins: make is not called');

          const emptyInput = await runCase('empty image-names falls back', {
            'p2p-images': 'worker\n',
          }, { IMAGE_NAMES: ' , \n\t' });
          assert.deepStrictEqual(emptyInput.failures, [], 'empty image-names falls back: no failures');
          assert.strictEqual(
            emptyInput.outputs['image-refs'],
            'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/worker:1.2.3',
          );

          const noTargets = await runCase('no targets fails cleanly', {});
          assert.deepStrictEqual(
            noTargets.failures,
            ['Neither image-names nor p2p-images produced any image references; nothing to scan.'],
          );
          assert.strictEqual(noTargets.outputs['image-refs'], undefined);

          const unknownStage = await runCase(
            'unknown stage fails cleanly',
            { 'p2p-images': 'api\n' },
            { PIPELINE_STAGE: 'qa' },
          );
          assert.deepStrictEqual(
            unknownStage.failures,
            ["Unknown pipeline-stage 'qa'. Expected: fast-feedback|extended-test|prod."],
          );
          assert.strictEqual(unknownStage.outputs['image-refs'], undefined);
          assert.deepStrictEqual(unknownStage.calls, [], 'unknown stage fails before make');

          console.log('image ref resolver fixtures passed');
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Test scheduled image name pass-through
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-security-scan.yaml').read_text()
          needle = 'image-names: $' + '{{ inputs.image-names }}'
          count = workflow.count(needle)
          assert count == 3, f'expected 3 image-names pass-throughs, got {count}'
          PY

      - name: Test scheduled image scans use stage matrices
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-security-scan.yaml').read_text()
          assert workflow.count('uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml') == 3
          for name in (
              'fast-feedback-source',
              'extended-test-source',
              'prod-source',
              'fast-feedback-github-env',
              'extended-test-github-env',
              'prod-github-env',
          ):
              assert f'{name}:' not in workflow, f'{name} should be derived from repository variables'
          for var in ('FAST_FEEDBACK', 'EXTENDED_TEST', 'PROD'):
              assert f'matrix: $' + f'{{{{ fromJSON(vars.{var}) }}}}' in workflow, f'missing matrix for vars.{var}'
          assert workflow.count('github_env: $' + '{{ matrix.deploy_env }}') == 3
          PY

      - name: Test image scan comments identify stage
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          latest_workflow = Path('.github/workflows/p2p-get-latest-image.yaml').read_text()
          assert 'name: get-latest-image ($' + '{{ inputs.registry-path }}, $' + '{{ inputs.github_env }})' in latest_workflow

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml').read_text()
          assert "name: image-scan ($" + "{{ inputs.github_env != '' && format('{0}, {1}', inputs.pipeline-stage, inputs.github_env) || inputs.pipeline-stage }})" in workflow
          assert 'name: ' + "'image-scan ($" + '{{ inputs.github_env }})' not in workflow
          assert 'Image scan (${process.env.PIPELINE_STAGE}' in workflow
          assert 'PIPELINE_STAGE: $' + '{{ inputs.pipeline-stage }}' in workflow
          assert 'header: image-scan-findings-$' + '{{ inputs.pipeline-stage }}-$' + '{{ inputs.github_env || ' in workflow
          assert 'name: image-scan-reports-$' + '{{ inputs.pipeline-stage }}-$' + '{{ inputs.github_env || ' in workflow
          PY

      - name: Test image scan target construction
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          python3 .github/scripts/extract-workflow-scripts.py \
            --workflow .github/workflows/p2p-workflow-image-scan.yaml \
            --out-dir /tmp \
            --step scan=image-scan-script.js \
            --step secret-scan=image-secret-scan-script.js \
            --require scan='const target' \
            --require scan='@${digest}' \
            --require secret-scan='docker://${' \
            --require secret-scan='@${digest}'

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const vm = require('vm');

          function runScanScript(scriptPath) {
            const script = fs.readFileSync(scriptPath, 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-targets-'));
            const pulledList = path.join(tmp, 'pulled-images.txt');
            fs.writeFileSync(
              pulledList,
              [
                'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3\tlinux/amd64\tsha256:api',
                'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3\tlinux/arm64\tsha256:worker',
              ].join('\n') + '\n',
            );

            const calls = [];
            const outputs = {};
            const failures = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  PULLED_LIST: pulledList,
                  SEVERITY: 'CRITICAL,HIGH',
                  IGNORE_UNFIXED: 'true',
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
              },
              require: (moduleName) => {
                if (moduleName === 'child_process') {
                  return {
                    execFileSync(command, args) {
                      calls.push({ command, args });
                      return '';
                    },
                    spawnSync(command, args) {
                      calls.push({ command, args });
                      return { status: 0, stdout: '', stderr: '' };
                    },
                  };
                }
                return require(moduleName);
              },
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            assert.deepStrictEqual(failures, []);
            return { calls, outputs };
          }

          const trivyRun = runScanScript('/tmp/image-scan-script.js');
          assert.deepStrictEqual(
            trivyRun.calls.map(call => call.args[call.args.length - 1]),
            [
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3@sha256:api',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3@sha256:worker',
            ],
          );

          const secretRun = runScanScript('/tmp/image-secret-scan-script.js');
          assert.deepStrictEqual(
            secretRun.calls.map(call => call.args[2]),
            [
              'docker://europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3@sha256:api',
              'docker://europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3@sha256:worker',
            ],
          );
          for (const line of fs.readFileSync(secretRun.outputs['report-list'], 'utf8').trim().split('\n')) {
            const reportPath = line.split('\t')[3];
            assert.strictEqual(path.extname(reportPath), '.jsonl');
          }

          console.log('image scan target fixtures passed');
          NODE

      - name: Test image scan manifest construction
        run: |
          set -euo pipefail
          python3 .github/scripts/extract-workflow-scripts.py \
            --workflow .github/workflows/p2p-workflow-image-scan.yaml \
            --out-dir /tmp \
            --step pull-images=image-pull-script.js \
            --step manifest=image-manifest-script.js \
            --require pull-images="'buildx'" \
            --require manifest=schemaVersion \
            --require manifest=vulnerabilityReport \
            --require manifest=secretReport

          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml')
          upload_block = []
          in_upload = False
          for line in workflow.read_text().splitlines():
              if line.startswith('      - name: Upload image-scan reports'):
                  in_upload = True
              elif in_upload and line.startswith('      - name: '):
                  break
              elif in_upload and line and not line.startswith('      '):
                  break
              if in_upload:
                  upload_block.append(line)
          upload_text = '\n'.join(upload_block)
          for forbidden in ('always()', 'reports-dir', 'reports.txt', 'if-no-files-found: ignore'):
              if forbidden in upload_text:
                  raise SystemExit(f'Upload image-scan reports must not contain {forbidden}')
          for required in ('steps.manifest.outputs.artifact-dir', 'if-no-files-found: error'):
              if required not in upload_text:
                  raise SystemExit(f'Upload image-scan reports is missing {required}')
          PY

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const vm = require('vm');

          function runPullScript(imageRefs, inspectByRef) {
            const script = fs.readFileSync('/tmp/image-pull-script.js', 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-pull-'));
            const outputs = {};
            const failures = [];
            const pulls = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  IMAGE_REFS: imageRefs.join('\n'),
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
              },
              require: (moduleName) => {
                if (moduleName === 'child_process') {
                  return {
                    execFileSync(command, args) {
                      assert.strictEqual(command, 'docker');
                      if (args[0] === 'buildx') {
                        const ref = args[3];
                        if (!inspectByRef[ref]) throw new Error(`unexpected inspect ref ${ref}`);
                        return JSON.stringify(inspectByRef[ref]);
                      }
                      if (args[0] === 'pull') {
                        pulls.push(args);
                        return '';
                      }
                      throw new Error(`unexpected docker args ${args.join(' ')}`);
                    },
                  };
                }
                return require(moduleName);
              },
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            return { outputs, failures, pulls };
          }

          function runManifestScript({ stage, vulnLines = [], secretLines = [], vulnRawLines = null, secretRawLines = null }) {
            const script = fs.readFileSync('/tmp/image-manifest-script.js', 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-manifest-'));
            const trivyDir = path.join(tmp, 'trivy');
            const secretDir = path.join(tmp, 'trufflehog-image');
            fs.mkdirSync(trivyDir, { recursive: true });
            fs.mkdirSync(secretDir, { recursive: true });
            const vulnList = path.join(trivyDir, 'reports.txt');
            const secretList = path.join(secretDir, 'reports.txt');
            const writeReport = (dir, name) => {
              if (name.includes('..')) return name;
              const report = path.join(dir, name);
              if (name.startsWith('missing-')) return report;
              fs.writeFileSync(report, name.startsWith('empty-') ? '' : '{}');
              return report;
            };
            fs.writeFileSync(
              vulnList,
              vulnRawLines === null
                ? vulnLines.map(([ref, plat, digest, name]) => `${ref}\t${plat}\t${digest}\t${writeReport(trivyDir, name)}`).join('\n') + '\n'
                : vulnRawLines.join('\n') + '\n',
            );
            fs.writeFileSync(
              secretList,
              secretRawLines === null
                ? secretLines.map(([ref, plat, digest, name]) => `${ref}\t${plat}\t${digest}\t${writeReport(secretDir, name)}`).join('\n') + '\n'
                : secretRawLines.join('\n') + '\n',
            );

            const outputs = {};
            const failures = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  PIPELINE_STAGE: stage,
                  REPORT_LIST: vulnList,
                  SECRET_REPORT_LIST: secretList,
                  REPORT_ROOT: trivyDir,
                  SECRET_REPORT_ROOT: secretDir,
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
                warning: () => {},
              },
              require,
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            return {
              manifest: outputs['manifest-path'] ? JSON.parse(fs.readFileSync(outputs['manifest-path'], 'utf8')) : null,
              manifestPath: outputs['manifest-path'],
              artifactDir: outputs['artifact-dir'],
              tmp,
              failures,
            };
          }

          const singlePlatform = runPullScript(
            ['europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3'],
            {
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3': {
                manifest: { digest: 'sha256:resolved' },
                image: { os: 'linux', architecture: 'amd64' },
              },
            },
          );
          assert.deepStrictEqual(singlePlatform.failures, []);
          assert.deepStrictEqual(
            fs.readFileSync(singlePlatform.outputs['list-path'], 'utf8').trim(),
            'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/api:1.2.3\tlinux/amd64\tsha256:resolved',
          );

          const multiPlatform = runPullScript(
            ['europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3'],
            {
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3': {
                manifest: {
                  digest: 'sha256:index',
                  manifests: [
                    { platform: { os: 'linux', architecture: 'amd64' }, digest: 'sha256:amd64' },
                    { platform: { os: 'linux', architecture: 'arm64' }, digest: 'sha256:arm64' },
                  ],
                },
              },
            },
          );
          assert.deepStrictEqual(multiPlatform.failures, []);
          assert.deepStrictEqual(
            fs.readFileSync(multiPlatform.outputs['list-path'], 'utf8').trim().split('\n'),
            [
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3\tlinux/amd64\tsha256:amd64',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/prod/worker:1.2.3\tlinux/arm64\tsha256:arm64',
            ],
          );

          const multi = runManifestScript({
            stage: 'extended-test',
            vulnLines: [
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/arm64', 'sha256:z-arm', 'zeta-arm-vuln.json'],
              ['ghcr.io/coreeng/alpha:1.0.0', 'linux/amd64', 'sha256:a-amd', 'alpha-amd-vuln.json'],
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/amd64', 'sha256:z-amd', 'zeta-amd-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/arm64', 'sha256:z-arm', 'zeta-arm-secret.jsonl'],
              ['ghcr.io/coreeng/alpha:1.0.0', 'linux/amd64', 'sha256:a-amd', 'alpha-amd-secret.jsonl'],
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/amd64', 'sha256:z-amd', 'zeta-amd-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(multi.failures, []);
          assert.strictEqual(path.basename(multi.manifestPath), 'manifest.json');
          assert.strictEqual(path.basename(multi.artifactDir), 'image-scan-artifact');
          assert.strictEqual(multi.manifestPath, path.join(multi.artifactDir, 'manifest.json'));
          assert.deepStrictEqual(multi.manifest, {
            schemaVersion: 1,
            stage: 'extended-test',
            reports: [
              {
                imageRef: 'ghcr.io/coreeng/alpha:1.0.0',
                platform: 'linux/amd64',
                digest: 'sha256:a-amd',
                vulnerabilityReport: 'trivy/alpha-amd-vuln.json',
                secretReport: 'trufflehog-image/alpha-amd-secret.jsonl',
              },
              {
                imageRef: 'ghcr.io/coreeng/zeta:1.0.0',
                platform: 'linux/amd64',
                digest: 'sha256:z-amd',
                vulnerabilityReport: 'trivy/zeta-amd-vuln.json',
                secretReport: 'trufflehog-image/zeta-amd-secret.jsonl',
              },
              {
                imageRef: 'ghcr.io/coreeng/zeta:1.0.0',
                platform: 'linux/arm64',
                digest: 'sha256:z-arm',
                vulnerabilityReport: 'trivy/zeta-arm-vuln.json',
                secretReport: 'trufflehog-image/zeta-arm-secret.jsonl',
              },
            ],
          });
          assert(fs.existsSync(path.join(multi.artifactDir, 'manifest.json')));
          assert(fs.existsSync(path.join(multi.artifactDir, 'trivy/alpha-amd-vuln.json')));
          assert(fs.existsSync(path.join(multi.artifactDir, 'trufflehog-image/alpha-amd-secret.jsonl')));
          assert(!fs.existsSync(path.join(multi.artifactDir, 'trivy/reports.txt')));
          assert(!fs.existsSync(path.join(multi.artifactDir, 'trufflehog-image/reports.txt')));

          const single = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(single.failures, []);
          assert.deepStrictEqual(single.manifest.reports, [
            {
              imageRef: 'ghcr.io/coreeng/single:1.0.0',
              platform: 'linux/amd64',
              digest: 'sha256:single',
              vulnerabilityReport: 'trivy/single-vuln.json',
              secretReport: 'trufflehog-image/single-secret.jsonl',
            },
          ]);

          const cleanSecretScan = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/clean-secret:1.0.0', 'linux/amd64', 'sha256:clean', 'clean-secret-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/clean-secret:1.0.0', 'linux/amd64', 'sha256:clean', 'empty-clean-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(cleanSecretScan.failures, []);
          assert.deepStrictEqual(cleanSecretScan.manifest.reports, [
            {
              imageRef: 'ghcr.io/coreeng/clean-secret:1.0.0',
              platform: 'linux/amd64',
              digest: 'sha256:clean',
              vulnerabilityReport: 'trivy/clean-secret-vuln.json',
              secretReport: 'trufflehog-image/empty-clean-secret.jsonl',
            },
          ]);

          const singleVuln = ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'];
          const singleSecret = ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'];
          const failureCases = [
            {
              name: 'missing secret report',
              input: { stage: 'fast-feedback', vulnLines: [singleVuln], secretLines: [] },
              failures: ['Missing secret report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
            },
            {
              name: 'missing vulnerability report',
              input: { stage: 'fast-feedback', vulnLines: [], secretLines: [singleSecret] },
              failures: ['Missing vulnerability report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
            },
            {
              name: 'invalid stage',
              input: { stage: 'qa', vulnLines: [singleVuln], secretLines: [singleSecret] },
              failures: ["Unknown pipeline-stage 'qa'. Expected: fast-feedback|extended-test|prod."],
            },
            {
              name: 'malformed list row',
              input: {
                stage: 'fast-feedback',
                vulnRawLines: ['ghcr.io/coreeng/single:1.0.0\tlinux/amd64\tsha256:single'],
                secretLines: [],
              },
              failures: ['Malformed vulnerability report list entry: ghcr.io/coreeng/single:1.0.0\tlinux/amd64\tsha256:single'],
            },
            {
              name: 'duplicate vulnerability report',
              input: {
                stage: 'fast-feedback',
                vulnLines: [
                  singleVuln,
                  ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln-copy.json'],
                ],
                secretLines: [singleSecret],
              },
              failures: ['Duplicate vulnerability report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
            },
            {
              name: 'missing report path',
              input: {
                stage: 'fast-feedback',
                vulnLines: [['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'missing-vuln.json']],
                secretLines: [singleSecret],
              },
              failures: result => ['Vulnerability report path does not exist: ' + path.join(result.tmp, 'trivy', 'missing-vuln.json')],
            },
            {
              name: 'no reports',
              input: { stage: 'fast-feedback' },
              failures: ['No scanned image reports found; cannot build manifest.json.'],
            },
            {
              name: 'bad secret extension',
              input: {
                stage: 'fast-feedback',
                vulnLines: [singleVuln],
                secretLines: [['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.json']],
              },
              failures: ['Secret report path must end in .jsonl: single-secret.json'],
            },
            {
              name: 'parent traversal',
              input: {
                stage: 'fast-feedback',
                vulnLines: [['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', '../single-vuln.json']],
                secretLines: [singleSecret],
              },
              failures: ['Vulnerability report path must stay inside report root: ../single-vuln.json'],
            },
            {
              name: 'empty vulnerability report',
              input: {
                stage: 'fast-feedback',
                vulnLines: [['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'empty-vuln.json']],
                secretLines: [singleSecret],
              },
              failures: ['Vulnerability report is empty: empty-vuln.json'],
            },
          ];
          for (const testCase of failureCases) {
            const result = runManifestScript(testCase.input);
            const failures = typeof testCase.failures === 'function'
              ? testCase.failures(result)
              : testCase.failures;
            assert.deepStrictEqual(result.failures, failures, testCase.name);
          }

          console.log('image scan manifest fixtures passed');
          NODE

