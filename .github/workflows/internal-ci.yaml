name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  increment-version:
    uses: ./.github/workflows/internal-version.yaml
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true

  print-version:
    runs-on: ubuntu-24.04
    needs: increment-version
    steps:
      - env:
          VERSION: ${{needs.increment-version.outputs.version}}
        id: step1
        run: echo "The Next Version is $VERSION"

  test_version:
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
      version-prefix: app-tag
    uses: ./.github/workflows/p2p-version.yaml

  test_version_default :
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
    uses: ./.github/workflows/p2p-version.yaml

  test_execute_command:
    needs: [test_version]
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      command: test-var-print
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_fastfeedback:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-fastfeedback.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_source_security_scan:
    uses: ./.github/workflows/p2p-workflow-source-security-scan.yaml
    with:
      scope: changes
      fail-on-findings: false
      dry-run: true
      timeout-minutes: 10

  test_image_scan:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      pipeline-stage: fast-feedback
      version: ${{ needs.test_version.outputs.version }}

  test_image_scan_extended_test:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      pipeline-stage: extended-test
      version: ${{ needs.test_version.outputs.version }}

  test_image_scan_prod:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      pipeline-stage: prod
      version: ${{ needs.test_version.outputs.version }}

  test_image_ref_resolution:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test image reference resolver
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml')
          lines = workflow.read_text().splitlines()
          in_step = False
          in_script = False
          script = []

          for line in lines:
              if line.startswith('      - id: resolve-images'):
                  in_step = True
                  continue
              if in_step and line.startswith('      - id: ') and 'resolve-images' not in line:
                  break
              if in_step and line.strip() == 'script: |':
                  in_script = True
                  continue
              if in_script:
                  if line.startswith('            '):
                      script.append(line[12:])
                  elif line.strip() == '':
                      script.append('')
                  else:
                      break

          if not script:
              raise SystemExit('Could not extract Resolve image references script')
          extracted = '\n'.join(script) + '\n'
          for marker in ('p2p-image-refs', 'normalizeExplicitRef', 'core.setFailed'):
              if marker not in extracted:
                  raise SystemExit(f'Extracted resolver script is missing expected marker: {marker}')
          Path('/tmp/resolve-image-refs.js').write_text(extracted)
          PY

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const vm = require('vm');

          const resolverScript = fs.readFileSync('/tmp/resolve-image-refs.js', 'utf8');

          async function runCase(name, makeOutputs, envOverrides = {}) {
            const calls = [];
            const outputs = {};
            const infos = [];
            const failures = [];
            const make = (target) => makeOutputs[target] ?? null;

            const sandbox = {
              process: {
                env: {
                  PIPELINE_STAGE: 'fast-feedback',
                  REGION: 'europe-west2',
                  PROJECT_ID: 'project-a',
                  TENANT_NAME: 'tenant-a',
                  VERSION: '1.2.3',
                  WORKING_DIR: '/repo',
                  ...envOverrides,
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                info: (message) => { infos.push(message); },
                setFailed: (message) => { failures.push(message); },
              },
              require: (moduleName) => {
                if (moduleName !== 'child_process') {
                  return require(moduleName);
                }
                return {
                  execFileSync(command, args, options) {
                    calls.push({ command, args, cwd: options.cwd });
                    assert.strictEqual(command, 'make', `${name}: command`);
                    const target = args[args.length - 1];
                    if (args.includes('-q')) {
                      if (Object.prototype.hasOwnProperty.call(makeOutputs, target)) {
                        return '';
                      }
                      const error = new Error(`No rule to make target '${target}'`);
                      error.status = 2;
                      throw error;
                    }
                    const output = make(target);
                    if (output === null) {
                      const error = new Error(`No rule to make target '${target}'`);
                      error.status = 2;
                      throw error;
                    }
                    return output;
                  },
                };
              },
            };

            await vm.runInNewContext(`(async () => {\n${resolverScript}\n})()`, sandbox);
            return { calls, outputs, infos, failures };
          }

          (async () => {
          const fallback = await runCase('missing override falls back', {
            'p2p-images': 'api ui\n',
          });
          assert.deepStrictEqual(fallback.failures, [], 'missing override falls back: no failures');
          assert.deepStrictEqual(
            fallback.outputs['image-refs'].split('\n'),
            [
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/api:1.2.3',
              'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/ui:1.2.3',
            ],
          );

          const explicit = await runCase('explicit refs normalize', {
            'p2p-image-refs': [
              'ghcr.io/coreeng/support-bot',
              'ghcr.io/coreeng/support-bot:0.0.48',
              'ghcr.io/coreeng/support-bot@sha256:abc123',
              'localhost:5000/team/service',
            ].join('\n'),
            'p2p-images': 'should-not-be-used\n',
          });
          assert.deepStrictEqual(explicit.failures, [], 'explicit refs normalize: no failures');
          assert.deepStrictEqual(
            explicit.outputs['image-refs'].split('\n'),
            [
              'ghcr.io/coreeng/support-bot:1.2.3',
              'ghcr.io/coreeng/support-bot:0.0.48',
              'ghcr.io/coreeng/support-bot@sha256:abc123',
              'localhost:5000/team/service:1.2.3',
            ],
          );
          assert.deepStrictEqual(
            explicit.calls.map(call => call.args[call.args.length - 1]),
            ['p2p-image-refs', 'p2p-image-refs'],
          );

          const emptyOverride = await runCase('empty override falls back', {
            'p2p-image-refs': '\n',
            'p2p-images': 'worker\n',
          });
          assert.deepStrictEqual(emptyOverride.failures, [], 'empty override falls back: no failures');
          assert.strictEqual(
            emptyOverride.outputs['image-refs'],
            'europe-west2-docker.pkg.dev/project-a/tenant/tenant-a/fast-feedback/worker:1.2.3',
          );

          const noTargets = await runCase('no targets fails cleanly', {
            'p2p-image-refs': '\n',
          });
          assert.deepStrictEqual(
            noTargets.failures,
            ['Neither p2p-image-refs nor p2p-images produced any image references; nothing to scan.'],
          );
          assert.strictEqual(noTargets.outputs['image-refs'], undefined);

          const unknownStage = await runCase(
            'unknown stage fails cleanly',
            { 'p2p-images': 'api\n' },
            { PIPELINE_STAGE: 'qa' },
          );
          assert.deepStrictEqual(
            unknownStage.failures,
            ["Unknown pipeline-stage 'qa'. Expected: fast-feedback|extended-test|prod."],
          );
          assert.strictEqual(unknownStage.outputs['image-refs'], undefined);

          console.log('image ref resolver fixtures passed');
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Test image scan target construction
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def extract_script(step_id):
              workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml')
              lines = workflow.read_text().splitlines()
              in_step = False
              in_script = False
              script = []

              for line in lines:
                  if line.startswith(f'      - id: {step_id}'):
                      in_step = True
                      continue
                  if in_step and line.startswith('      - id: ') and step_id not in line:
                      break
                  if in_step and line.strip() == 'script: |':
                      in_script = True
                      continue
                  if in_script:
                      if line.startswith('            '):
                          script.append(line[12:])
                      elif line.strip() == '':
                          script.append('')
                      else:
                          break

              if not script:
                  raise SystemExit(f'Could not extract {step_id} script')
              return '\n'.join(script) + '\n'

          scripts = {
              'scan': extract_script('scan'),
              'secret-scan': extract_script('secret-scan'),
          }
          for marker in ('const target', '@${digest}'):
              if marker not in scripts['scan']:
                  raise SystemExit(f'Extracted scan script is missing expected marker: {marker}')
          for marker in ('docker://${', '@${digest}'):
              if marker not in scripts['secret-scan']:
                  raise SystemExit(f'Extracted secret-scan script is missing expected marker: {marker}')

          Path('/tmp/image-scan-script.js').write_text(scripts['scan'])
          Path('/tmp/image-secret-scan-script.js').write_text(scripts['secret-scan'])
          PY

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const vm = require('vm');

          function runScanScript(scriptPath) {
            const script = fs.readFileSync(scriptPath, 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-targets-'));
            const pulledList = path.join(tmp, 'pulled-images.txt');
            fs.writeFileSync(
              pulledList,
              [
                'ghcr.io/coreeng/support-bot@sha256:input\tlinux/amd64\tsha256:resolved',
                'ghcr.io/coreeng/support-bot:0.0.48\tlinux/arm64\tsha256:tagresolved',
              ].join('\n') + '\n',
            );

            const calls = [];
            const outputs = {};
            const failures = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  PULLED_LIST: pulledList,
                  SEVERITY: 'CRITICAL,HIGH',
                  IGNORE_UNFIXED: 'true',
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
              },
              require: (moduleName) => {
                if (moduleName === 'child_process') {
                  return {
                    execFileSync(command, args) {
                      calls.push({ command, args });
                      return '';
                    },
                    spawnSync(command, args) {
                      calls.push({ command, args });
                      return { status: 0, stdout: '', stderr: '' };
                    },
                  };
                }
                return require(moduleName);
              },
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            assert.deepStrictEqual(failures, []);
            return { calls, outputs };
          }

          const trivyRun = runScanScript('/tmp/image-scan-script.js');
          assert.deepStrictEqual(
            trivyRun.calls.map(call => call.args[call.args.length - 1]),
            [
              'ghcr.io/coreeng/support-bot@sha256:resolved',
              'ghcr.io/coreeng/support-bot:0.0.48@sha256:tagresolved',
            ],
          );

          const secretRun = runScanScript('/tmp/image-secret-scan-script.js');
          assert.deepStrictEqual(
            secretRun.calls.map(call => call.args[2]),
            [
              'docker://ghcr.io/coreeng/support-bot@sha256:resolved',
              'docker://ghcr.io/coreeng/support-bot:0.0.48@sha256:tagresolved',
            ],
          );
          for (const line of fs.readFileSync(secretRun.outputs['report-list'], 'utf8').trim().split('\n')) {
            const reportPath = line.split('\t')[3];
            assert.strictEqual(path.extname(reportPath), '.jsonl');
          }

          console.log('image scan target fixtures passed');
          NODE

      - name: Test image scan manifest construction
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml')

          def extract_script(step_id):
              lines = workflow.read_text().splitlines()
              in_step = False
              in_script = False
              script = []

              for line in lines:
                  if line.startswith(f'      - id: {step_id}'):
                      in_step = True
                      continue
                  if in_step and line.startswith('      - id: ') and step_id not in line:
                      break
                  if in_step and line.strip() == 'script: |':
                      in_script = True
                      continue
                  if in_script:
                      if line.startswith('            '):
                          script.append(line[12:])
                      elif line.strip() == '':
                          script.append('')
                      else:
                          break

              if not script:
                  raise SystemExit(f'Could not extract {step_id} script')
              return '\n'.join(script) + '\n'

          scripts = {
              'pull-images': extract_script('pull-images'),
              'manifest': extract_script('manifest'),
          }
          upload_block = []
          in_upload = False
          for line in workflow.read_text().splitlines():
              if line.startswith('      - name: Upload image-scan reports'):
                  in_upload = True
              elif in_upload and line.startswith('      - name: '):
                  break
              if in_upload:
                  upload_block.append(line)
          upload_text = '\n'.join(upload_block)
          for forbidden in ('always()', 'reports-dir', 'reports.txt', 'if-no-files-found: ignore'):
              if forbidden in upload_text:
                  raise SystemExit(f'Upload image-scan reports must not contain {forbidden}')
          for required in ('steps.manifest.outputs.artifact-dir', 'if-no-files-found: error'):
              if required not in upload_text:
                  raise SystemExit(f'Upload image-scan reports is missing {required}')
          for marker in ('pinnedDigest', 'platform-specific manifest digest'):
              if marker not in scripts['pull-images']:
                  raise SystemExit(f'Extracted pull-images script is missing expected marker: {marker}')
          for marker in ('schemaVersion', 'vulnerabilityReport', 'secretReport'):
              if marker not in scripts['manifest']:
                  raise SystemExit(f'Extracted manifest script is missing expected marker: {marker}')

          Path('/tmp/image-pull-script.js').write_text(scripts['pull-images'])
          Path('/tmp/image-manifest-script.js').write_text(scripts['manifest'])
          PY

          node <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const vm = require('vm');

          function runPullScript(imageRefs, inspectByRef) {
            const script = fs.readFileSync('/tmp/image-pull-script.js', 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-pull-'));
            const outputs = {};
            const failures = [];
            const pulls = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  IMAGE_REFS: imageRefs.join('\n'),
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
              },
              require: (moduleName) => {
                if (moduleName === 'child_process') {
                  return {
                    execFileSync(command, args) {
                      assert.strictEqual(command, 'docker');
                      if (args[0] === 'buildx') {
                        const ref = args[3];
                        if (!inspectByRef[ref]) throw new Error(`unexpected inspect ref ${ref}`);
                        return JSON.stringify(inspectByRef[ref]);
                      }
                      if (args[0] === 'pull') {
                        pulls.push(args);
                        return '';
                      }
                      throw new Error(`unexpected docker args ${args.join(' ')}`);
                    },
                  };
                }
                return require(moduleName);
              },
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            return { outputs, failures, pulls };
          }

          function runManifestScript({ stage, vulnLines = [], secretLines = [], vulnRawLines = null, secretRawLines = null }) {
            const script = fs.readFileSync('/tmp/image-manifest-script.js', 'utf8');
            const tmp = fs.mkdtempSync(path.join(os.tmpdir(), 'image-manifest-'));
            const trivyDir = path.join(tmp, 'trivy');
            const secretDir = path.join(tmp, 'trufflehog-image');
            fs.mkdirSync(trivyDir, { recursive: true });
            fs.mkdirSync(secretDir, { recursive: true });
            const vulnList = path.join(trivyDir, 'reports.txt');
            const secretList = path.join(secretDir, 'reports.txt');
            const writeReport = (dir, name) => {
              if (name.includes('..')) return name;
              const report = path.join(dir, name);
              if (name.startsWith('missing-')) return report;
              fs.writeFileSync(report, name.startsWith('empty-') ? '' : '{}');
              return report;
            };
            fs.writeFileSync(
              vulnList,
              vulnRawLines === null
                ? vulnLines.map(([ref, plat, digest, name]) => `${ref}\t${plat}\t${digest}\t${writeReport(trivyDir, name)}`).join('\n') + '\n'
                : vulnRawLines.join('\n') + '\n',
            );
            fs.writeFileSync(
              secretList,
              secretRawLines === null
                ? secretLines.map(([ref, plat, digest, name]) => `${ref}\t${plat}\t${digest}\t${writeReport(secretDir, name)}`).join('\n') + '\n'
                : secretRawLines.join('\n') + '\n',
            );

            const outputs = {};
            const failures = [];
            const sandbox = {
              process: {
                env: {
                  RUNNER_TEMP: tmp,
                  PIPELINE_STAGE: stage,
                  REPORT_LIST: vulnList,
                  SECRET_REPORT_LIST: secretList,
                  REPORT_ROOT: trivyDir,
                  SECRET_REPORT_ROOT: secretDir,
                },
              },
              core: {
                setOutput: (key, value) => { outputs[key] = value; },
                setFailed: (message) => { failures.push(message); },
                info: () => {},
                warning: () => {},
              },
              require,
            };

            vm.runInNewContext(`(async () => {\n${script}\n})()`, sandbox);
            return {
              manifest: outputs['manifest-path'] ? JSON.parse(fs.readFileSync(outputs['manifest-path'], 'utf8')) : null,
              manifestPath: outputs['manifest-path'],
              artifactDir: outputs['artifact-dir'],
              tmp,
              failures,
            };
          }

          const matchingPinned = runPullScript(
            ['ghcr.io/coreeng/support-bot@sha256:resolved'],
            {
              'ghcr.io/coreeng/support-bot@sha256:resolved': {
                manifest: { digest: 'sha256:resolved' },
                image: { os: 'linux', architecture: 'amd64' },
              },
            },
          );
          assert.deepStrictEqual(matchingPinned.failures, []);
          assert.deepStrictEqual(
            fs.readFileSync(matchingPinned.outputs['list-path'], 'utf8').trim(),
            'ghcr.io/coreeng/support-bot@sha256:resolved\tlinux/amd64\tsha256:resolved',
          );

          const mismatchedPinned = runPullScript(
            ['ghcr.io/coreeng/support-bot@sha256:input'],
            {
              'ghcr.io/coreeng/support-bot@sha256:input': {
                manifest: { digest: 'sha256:resolved' },
                image: { os: 'linux', architecture: 'amd64' },
              },
            },
          );
          assert.deepStrictEqual(mismatchedPinned.pulls, []);
          assert.deepStrictEqual(
            mismatchedPinned.failures,
            ['Resolved platform digest sha256:resolved for ghcr.io/coreeng/support-bot@sha256:input does not match pinned digest sha256:input. Use a platform-specific manifest digest for image scan evidence.'],
          );

          const pinnedIndexDigest = runPullScript(
            ['ghcr.io/coreeng/support-bot@sha256:index'],
            {
              'ghcr.io/coreeng/support-bot@sha256:index': {
                manifest: {
                  digest: 'sha256:index',
                  manifests: [
                    { platform: { os: 'linux', architecture: 'amd64' }, digest: 'sha256:amd64' },
                    { platform: { os: 'linux', architecture: 'arm64' }, digest: 'sha256:arm64' },
                  ],
                },
              },
            },
          );
          assert.deepStrictEqual(pinnedIndexDigest.pulls, []);
          assert.deepStrictEqual(
            pinnedIndexDigest.failures,
            ['Pinned digest sha256:index for ghcr.io/coreeng/support-bot@sha256:index resolves to an image index. Use a platform-specific manifest digest for image scan evidence.'],
          );

          const multi = runManifestScript({
            stage: 'extended-test',
            vulnLines: [
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/arm64', 'sha256:z-arm', 'zeta-arm-vuln.json'],
              ['ghcr.io/coreeng/alpha:1.0.0', 'linux/amd64', 'sha256:a-amd', 'alpha-amd-vuln.json'],
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/amd64', 'sha256:z-amd', 'zeta-amd-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/arm64', 'sha256:z-arm', 'zeta-arm-secret.jsonl'],
              ['ghcr.io/coreeng/alpha:1.0.0', 'linux/amd64', 'sha256:a-amd', 'alpha-amd-secret.jsonl'],
              ['ghcr.io/coreeng/zeta:1.0.0', 'linux/amd64', 'sha256:z-amd', 'zeta-amd-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(multi.failures, []);
          assert.strictEqual(path.basename(multi.manifestPath), 'manifest.json');
          assert.strictEqual(path.basename(multi.artifactDir), 'image-scan-artifact');
          assert.strictEqual(multi.manifestPath, path.join(multi.artifactDir, 'manifest.json'));
          assert.deepStrictEqual(multi.manifest, {
            schemaVersion: 1,
            stage: 'extended-test',
            reports: [
              {
                imageRef: 'ghcr.io/coreeng/alpha:1.0.0',
                platform: 'linux/amd64',
                digest: 'sha256:a-amd',
                vulnerabilityReport: 'trivy/alpha-amd-vuln.json',
                secretReport: 'trufflehog-image/alpha-amd-secret.jsonl',
              },
              {
                imageRef: 'ghcr.io/coreeng/zeta:1.0.0',
                platform: 'linux/amd64',
                digest: 'sha256:z-amd',
                vulnerabilityReport: 'trivy/zeta-amd-vuln.json',
                secretReport: 'trufflehog-image/zeta-amd-secret.jsonl',
              },
              {
                imageRef: 'ghcr.io/coreeng/zeta:1.0.0',
                platform: 'linux/arm64',
                digest: 'sha256:z-arm',
                vulnerabilityReport: 'trivy/zeta-arm-vuln.json',
                secretReport: 'trufflehog-image/zeta-arm-secret.jsonl',
              },
            ],
          });
          assert(fs.existsSync(path.join(multi.artifactDir, 'manifest.json')));
          assert(fs.existsSync(path.join(multi.artifactDir, 'trivy/alpha-amd-vuln.json')));
          assert(fs.existsSync(path.join(multi.artifactDir, 'trufflehog-image/alpha-amd-secret.jsonl')));
          assert(!fs.existsSync(path.join(multi.artifactDir, 'trivy/reports.txt')));
          assert(!fs.existsSync(path.join(multi.artifactDir, 'trufflehog-image/reports.txt')));

          const single = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(single.failures, []);
          assert.deepStrictEqual(single.manifest.reports, [
            {
              imageRef: 'ghcr.io/coreeng/single:1.0.0',
              platform: 'linux/amd64',
              digest: 'sha256:single',
              vulnerabilityReport: 'trivy/single-vuln.json',
              secretReport: 'trufflehog-image/single-secret.jsonl',
            },
          ]);

          const cleanSecretScan = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/clean-secret:1.0.0', 'linux/amd64', 'sha256:clean', 'clean-secret-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/clean-secret:1.0.0', 'linux/amd64', 'sha256:clean', 'empty-clean-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(cleanSecretScan.failures, []);
          assert.deepStrictEqual(cleanSecretScan.manifest.reports, [
            {
              imageRef: 'ghcr.io/coreeng/clean-secret:1.0.0',
              platform: 'linux/amd64',
              digest: 'sha256:clean',
              vulnerabilityReport: 'trivy/clean-secret-vuln.json',
              secretReport: 'trufflehog-image/empty-clean-secret.jsonl',
            },
          ]);

          const missingSecret = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
            ],
            secretLines: [],
          });
          assert.deepStrictEqual(
            missingSecret.failures,
            ['Missing secret report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
          );

          const missingVulnerability = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            missingVulnerability.failures,
            ['Missing vulnerability report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
          );

          const manifestDigestMismatch = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single@sha256:input', 'linux/amd64', 'sha256:resolved', 'single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single@sha256:input', 'linux/amd64', 'sha256:resolved', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            manifestDigestMismatch.failures,
            ['Pinned digest sha256:input for ghcr.io/coreeng/single@sha256:input does not match scanned digest sha256:resolved.'],
          );

          const invalidStage = runManifestScript({
            stage: 'qa',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            invalidStage.failures,
            ["Unknown pipeline-stage 'qa'. Expected: fast-feedback|extended-test|prod."],
          );

          const malformed = runManifestScript({
            stage: 'fast-feedback',
            vulnRawLines: ['ghcr.io/coreeng/single:1.0.0\tlinux/amd64\tsha256:single'],
            secretLines: [],
          });
          assert.deepStrictEqual(
            malformed.failures,
            ['Malformed vulnerability report list entry: ghcr.io/coreeng/single:1.0.0\tlinux/amd64\tsha256:single'],
          );

          const duplicate = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln-copy.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            duplicate.failures,
            ['Duplicate vulnerability report for ghcr.io/coreeng/single:1.0.0 (linux/amd64) @ sha256:single.'],
          );

          const missingPath = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'missing-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            missingPath.failures,
            ['Vulnerability report path does not exist: ' + path.join(missingPath.tmp, 'trivy', 'missing-vuln.json')],
          );

          const noReports = runManifestScript({ stage: 'fast-feedback' });
          assert.deepStrictEqual(
            noReports.failures,
            ['No scanned image reports found; cannot build manifest.json.'],
          );

          const badSecretExtension = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.json'],
            ],
          });
          assert.deepStrictEqual(
            badSecretExtension.failures,
            ['Secret report path must end in .jsonl: single-secret.json'],
          );

          const parentTraversal = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', '../single-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            parentTraversal.failures,
            ['Vulnerability report path must stay inside report root: ../single-vuln.json'],
          );

          const emptyReport = runManifestScript({
            stage: 'fast-feedback',
            vulnLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'empty-vuln.json'],
            ],
            secretLines: [
              ['ghcr.io/coreeng/single:1.0.0', 'linux/amd64', 'sha256:single', 'single-secret.jsonl'],
            ],
          });
          assert.deepStrictEqual(
            emptyReport.failures,
            ['Vulnerability report is empty: empty-vuln.json'],
          );

          console.log('image scan manifest fixtures passed');
          NODE

