name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  increment-version:
    uses: ./.github/workflows/internal-version.yaml
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true

  print-version:
    runs-on: ubuntu-24.04
    needs: increment-version
    steps:
      - env:
          VERSION: ${{needs.increment-version.outputs.version}}
        id: step1
        run: echo "The Next Version is $VERSION"

  test_version:
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
      version-prefix: app-tag
    uses: ./.github/workflows/p2p-version.yaml

  test_version_default :
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}
    with:
      dry-run: true
    uses: ./.github/workflows/p2p-version.yaml

  test_execute_command:
    needs: [test_version]
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      command: test-var-print
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_fastfeedback:
    needs: [test_version]
    uses: ./.github/workflows/p2p-workflow-fastfeedback.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      version: ${{ needs.test_version.outputs.version }}

  test_source_security_scan:
    uses: ./.github/workflows/p2p-workflow-source-security-scan.yaml
    with:
      secret-scan-scope: changes
      blocking-severity: off
      dry-run: true
      timeout-minutes: 10

  test_scheduled_security_scan:
    uses: ./.github/workflows/p2p-workflow-security-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      image-names: p2p
      dry-run: true
      security-scan-blocking-severity: off
      timeout-minutes: 10

  test_security_ignore_helper:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test shared P2P security ignore helper
        run: |
          set -euo pipefail
          node .github/scripts/tests/security-ignore-helper.test.js

  test_source_security_ignore_report:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test source security ignores split active and ignored findings
        run: |
          set -euo pipefail
          node .github/scripts/tests/source-security-ignore-report.test.js
          node .github/scripts/tests/source-secret-redaction.test.js

      - name: Test source security helpers stay outside app workspace
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-source-security-scan.yaml').read_text()
          assert 'path: .p2p-workflow-src' in workflow
          assert 'Move P2P workflow sources outside app workspace' in workflow
          assert 'mv .p2p-workflow-src "$RUNNER_TEMP/p2p-workflow-src"' in workflow
          assert 'tenant-name:' in workflow
          working_directory_input = workflow.split('working-directory:', 1)[1].split('timeout-minutes:', 1)[0]
          assert 'required: false' in working_directory_input
          assert 'type: string' in working_directory_input
          assert "default: '.'" in working_directory_input
          assert 'WORKING_DIRECTORY: $' + '{{ inputs.working-directory }}' in workflow
          assert 'header: security-source-scan-findings-$' + '{{ inputs.app-name || inputs.tenant-name || vars.TENANT_NAME }}' in workflow
          assert 'P2P_SECURITY_IGNORE_HELPER: $' + '{{ runner.temp }}/p2p-workflow-src/.github/scripts/p2p-security-ignore.js' in workflow
          assert "process.env.RUNNER_TEMP, 'p2p-workflow-src'" in workflow
          assert 'github.workspace' not in workflow

          fastfeedback = Path('.github/workflows/p2p-workflow-fastfeedback.yaml').read_text()
          source_call = fastfeedback.split('security-source-scan:', 1)[1].split('security-image-scan:', 1)[0]
          assert 'working-directory: $' + '{{ inputs.working-directory }}' in source_call
          PY

  test_image_scan:
    needs: [test_version]
    strategy:
      matrix:
        pipeline-stage: [fast-feedback, extended-test, prod]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      pipeline-stage: ${{ matrix.pipeline-stage }}
      version: ${{ needs.test_version.outputs.version }}

  test_image_security_ignore_report:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test image security ignores split active and ignored findings
        run: |
          set -euo pipefail
          node .github/scripts/tests/image-security-ignore-report.test.js

  test_image_ref_resolution:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Test latest image tag resolver
        run: |
          node .github/scripts/tests/latest-image.test.js

      - name: Test image reference resolver
        run: |
          node .github/scripts/tests/image-ref-resolution.test.js

      - name: Test scheduled image name pass-through
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-security-scan.yaml').read_text()
          assert "awk 'NF { print $1; exit }'" in workflow
          source_call = workflow.split('security-source-scan:', 1)[1].split('security-resolve-anchor-image:', 1)[0]
          assert 'working-directory: $' + '{{ inputs.working-directory }}' in source_call

          stage_call_markers = (
              ('security-image-scan-fast-feedback:', 'security-image-scan-extended-test:'),
              ('security-image-scan-extended-test:', 'security-image-scan-prod:'),
              ('security-image-scan-prod:', None),
          )
          for start_marker, end_marker in stage_call_markers:
              stage_call = workflow.split(start_marker, 1)[1]
              if end_marker is not None:
                  stage_call = stage_call.split(end_marker, 1)[0]
              assert 'uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml' in stage_call
              assert 'working-directory: $' + '{{ inputs.working-directory }}' in stage_call

          needle = 'image-names: $' + '{{ inputs.image-names }}'
          count = workflow.count(needle)
          assert count == 3, f'expected 3 image-names pass-throughs, got {count}'

          blocking = 'security-scan-blocking-severity: $' + '{{ inputs.security-scan-blocking-severity }}'
          blocking_count = workflow.count(blocking)
          assert blocking_count == 3, f'expected 3 scheduled blocking-severity pass-throughs, got {blocking_count}'

          app_name = 'app-name: $' + '{{ inputs.app-name }}'
          app_name_count = workflow.count(app_name)
          assert app_name_count == 4, f'expected source plus 3 scheduled app-name pass-throughs, got {app_name_count}'

          tenant_name = 'tenant-name: $' + '{{ inputs.tenant-name }}'
          tenant_name_count = workflow.count(tenant_name)
          assert tenant_name_count == 4, f'expected source plus 3 scheduled tenant-name pass-throughs, got {tenant_name_count}'

          stage_workflow = Path('.github/workflows/p2p-workflow-security-image-scan-stage.yaml').read_text()
          assert 'blocking-severity: $' + '{{ inputs.security-scan-blocking-severity }}' in stage_workflow
          assert 'app-name: $' + '{{ inputs.app-name }}' in stage_workflow
          discover_version_call = stage_workflow.split('security-discover-version:', 1)[1].split('security-image-scan:', 1)[0]
          image_scan_call = stage_workflow.split('security-image-scan:', 1)[1]
          assert 'working-directory: $' + '{{ inputs.working-directory }}' in discover_version_call
          assert 'working-directory: $' + '{{ inputs.working-directory }}' in image_scan_call

          ci_workflow = Path('.github/workflows/internal-ci.yaml').read_text()
          scheduled_security_call = 'uses: ./.github/workflows/' + 'p2p-workflow-security-scan.yaml'
          assert scheduled_security_call in ci_workflow
          PY

      - name: Test scheduled image scans use stage matrices
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-security-scan.yaml').read_text()
          assert workflow.count('uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml') == 3
          for name in (
              'fast-feedback-source',
              'extended-test-source',
              'prod-source',
              'fast-feedback-github-env',
              'extended-test-github-env',
              'prod-github-env',
          ):
              assert f'{name}:' not in workflow, f'{name} should be derived from repository variables'
          for var in ('FAST_FEEDBACK', 'EXTENDED_TEST', 'PROD'):
              assert f'matrix: $' + f'{{{{ fromJSON(vars.{var}) }}}}' in workflow, f'missing matrix for vars.{var}'
          assert workflow.count('github_env: $' + '{{ matrix.deploy_env }}') == 3
          PY

      - name: Test image scan comments identify stage
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          latest_workflow = Path('.github/workflows/p2p-get-latest-image.yaml').read_text()
          assert 'name: get-latest-image ($' + '{{ inputs.registry-path }}, $' + '{{ inputs.github_env }})' in latest_workflow

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml').read_text()
          assert "name: security-image-scan ($" + "{{ inputs.github_env != '' && format('{0}, {1}', inputs.pipeline-stage, inputs.github_env) || inputs.pipeline-stage }})" in workflow
          assert 'name: ' + "'security-image-scan ($" + '{{ inputs.github_env }})' not in workflow
          assert 'PIPELINE_STAGE: $' + '{{ inputs.pipeline-stage }}' in workflow
          assert 'header: security-image-scan-findings-$' + '{{ inputs.app-name || inputs.tenant-name || vars.TENANT_NAME }}-$' + '{{ inputs.pipeline-stage }}-$' + '{{ inputs.github_env || ' in workflow
          assert 'name: security-image-scan-reports-$' + '{{ inputs.pipeline-stage }}-$' + '{{ inputs.github_env || ' in workflow
          assert 'path: .p2p-workflow-src' in workflow
          assert 'Move P2P workflow sources outside app workspace' in workflow
          assert 'mv .p2p-workflow-src "$RUNNER_TEMP/p2p-workflow-src"' in workflow
          assert 'P2P_IMAGE_SCAN_HELPERS: $' + '{{ runner.temp }}/p2p-workflow-src/.github/scripts/image-scan-helpers.js' in workflow
          assert 'P2P_IMAGE_SECURITY_REPORT: $' + '{{ runner.temp }}/p2p-workflow-src/.github/scripts/image-security-report.js' in workflow
          assert 'WORKING_DIRECTORY: $' + '{{ inputs.working-directory }}' in workflow
          assert 'github.workspace' not in workflow
          assert 'json-file:' in workflow
          assert 'value: $' + '{{ jobs.security-image-scan.outputs.json-file }}' in workflow
          assert 'json-file: $' + '{{ steps.report.outputs.json-file }}' in workflow

          for workflow_path, end_marker in (
              ('.github/workflows/p2p-workflow-fastfeedback.yaml', 'functional-test:'),
              ('.github/workflows/p2p-workflow-extended-test.yaml', 'promote:'),
              ('.github/workflows/p2p-workflow-prod.yaml', 'prod-deploy:'),
          ):
              caller = Path(workflow_path).read_text()
              scan_call = caller.split('security-image-scan:', 1)[1].split(end_marker, 1)[0]
              assert 'working-directory: $' + '{{ inputs.working-directory }}' in scan_call

          report_module = Path('.github/scripts/image-security-report.js').read_text()
          assert '## Image scan (${code(env.PIPELINE_STAGE)}${envSuffix})' in report_module
          PY

      - name: Test image scan target construction
        run: |
          set -euo pipefail
          node .github/scripts/tests/image-scan-targets.test.js

      - name: Test image scan manifest construction
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/p2p-workflow-image-scan.yaml')
          upload_block = []
          in_upload = False
          for line in workflow.read_text().splitlines():
              if line.startswith('      - name: Upload security-image-scan reports'):
                  in_upload = True
              elif in_upload and line.startswith('      - name: '):
                  break
              elif in_upload and line and not line.startswith('      '):
                  break
              if in_upload:
                  upload_block.append(line)
          upload_text = '\n'.join(upload_block)
          for forbidden in ('always()', 'reports-dir', 'reports.txt', 'if-no-files-found: ignore'):
              if forbidden in upload_text:
                  raise SystemExit(f'Upload security-image-scan reports must not contain {forbidden}')
          for required in ('steps.manifest.outputs.artifact-dir', 'if-no-files-found: error'):
              if required not in upload_text:
                  raise SystemExit(f'Upload security-image-scan reports is missing {required}')
          PY

          node .github/scripts/tests/image-scan-manifest.test.js

  get_image_extended_test:
    uses: ./.github/workflows/p2p-get-latest-image-extended-test.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      main-branch: ${{ github.ref }}
      image-name: p2p

  test_extended_test:
    uses: ./.github/workflows/p2p-workflow-extended-test.yaml
    needs: [get_image_extended_test]
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      main-branch: ${{ github.ref }}
      version: ${{ needs.get_image_extended_test.outputs.version }}

  get_image_prod:
    uses: ./.github/workflows/p2p-get-latest-image-prod.yaml
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      main-branch: ${{ github.ref }}
      image-name: p2p

  test_prod:
    uses: ./.github/workflows/p2p-workflow-prod.yaml
    needs: [get_image_prod]
    secrets:
      env_vars: |
        TEST_VARIABLE=value
    with:
      dry-run: true
      main-branch: ${{ github.ref }}
      version: ${{ needs.get_image_prod.outputs.version }}
