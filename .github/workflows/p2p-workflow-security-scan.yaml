on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
    inputs:
      tenant-name:
        required: false
        type: string
        default: ''
      image-names:
        description: |
          Newline- or comma-separated list of image names. The first entry is
          used as the version-lookup anchor for each stage. If empty, the
          workflow runs `make p2p-images` in `working-directory` to discover
          the list. All images returned by `make p2p-images` are scanned.
        required: false
        type: string
        default: ''
      working-directory:
        required: false
        type: string
        default: '.'
      region:
        required: false
        type: string
        default: europe-west2
      fast-feedback-github-env:
        required: true
        type: string
      extended-test-github-env:
        required: true
        type: string
      prod-github-env:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
      timeout-minutes:
        required: false
        type: number
        default: 30

jobs:
  secret-scan:
    uses: ./.github/workflows/p2p-workflow-secret-scan.yaml
    with:
      scope: full-history
      fail-on-findings: false
      timeout-minutes: ${{ inputs.timeout-minutes }}

  # Resolve a single anchor image used to look up the latest version per
  # stage. All p2p images in a release share the same version, so any image
  # works. The full image list is rediscovered inside image-scan.
  resolve-anchor-image:
    name: resolve-anchor-image
    runs-on: ubuntu-24.04
    outputs:
      image-name: ${{ steps.pick.outputs.image-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - id: pick
        name: Pick anchor image
        shell: bash
        env:
          IMAGE_NAMES: ${{ inputs.image-names }}
          WORKING_DIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [ -n "${IMAGE_NAMES//[[:space:],]/}" ]; then
            anchor=$(printf '%s' "$IMAGE_NAMES" | tr ',\n' '  ' | awk '{print $1}')
          else
            anchor=$(make --no-print-directory -C "$WORKING_DIR" p2p-images | awk '{print $1}')
          fi
          if [ -z "$anchor" ]; then
            echo "::error::No anchor image found (image-names empty and 'make p2p-images' returned nothing)."
            exit 1
          fi
          echo "image-name=$anchor" >> "$GITHUB_OUTPUT"
          echo "Anchor image for version discovery: $anchor"

  discover-version-fast-feedback:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
    with:
      registry-path: fast-feedback
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      region: ${{ inputs.region }}
      github_env: ${{ inputs.fast-feedback-github-env }}
      working-directory: ${{ inputs.working-directory }}

  image-scan-fast-feedback:
    needs: [discover-version-fast-feedback]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    with:
      pipeline-stage: fast-feedback
      github_env: ${{ inputs.fast-feedback-github-env }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ needs.discover-version-fast-feedback.outputs.version }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      fail-on-findings: false

  discover-version-extended-test:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
    with:
      registry-path: extended-test
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      region: ${{ inputs.region }}
      github_env: ${{ inputs.extended-test-github-env }}
      working-directory: ${{ inputs.working-directory }}

  image-scan-extended-test:
    needs: [discover-version-extended-test]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    with:
      pipeline-stage: extended-test
      github_env: ${{ inputs.extended-test-github-env }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ needs.discover-version-extended-test.outputs.version }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      fail-on-findings: false

  discover-version-prod:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
    with:
      registry-path: prod
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      region: ${{ inputs.region }}
      github_env: ${{ inputs.prod-github-env }}
      working-directory: ${{ inputs.working-directory }}

  image-scan-prod:
    needs: [discover-version-prod]
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    with:
      pipeline-stage: prod
      github_env: ${{ inputs.prod-github-env }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ needs.discover-version-prod.outputs.version }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      fail-on-findings: false
