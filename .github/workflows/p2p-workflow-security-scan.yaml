on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
    inputs:
      tenant-name:
        required: false
        type: string
        default: ''
      app-name:
        required: false
        type: string
        default: ''
      image-names:
        description: |
          Newline- or comma-separated list of image names. The first entry is
          used as the version-lookup anchor for each stage, and the full list
          is passed to security-image-scan. If empty, security-image-scan falls back to repository
          discovery.
        required: false
        type: string
        default: ''
      working-directory:
        required: false
        type: string
        default: '.'
      region:
        required: false
        type: string
        default: europe-west2
      dry-run:
        required: false
        type: boolean
        default: false
      checkout-version:
        required: false
        type: string
        default: ''
      security-scan-blocking-severity:
        description: |
          Minimum severity that blocks the workflow for security-source-scan
          and security-image-scan findings: off, low, medium, high, or critical.
        required: false
        type: string
        default: 'off'
      security-scan-enabled:
        description: 'Run managed source and image security scans.'
        required: false
        type: boolean
        default: true
      security-scan-fail-on-non-blocking-findings:
        description: 'Fail security policy jobs for non-blocking findings for GitHub UI visibility.'
        required: false
        type: boolean
        default: false
      timeout-minutes:
        required: false
        type: number
        default: 30

jobs:
  security-source-scan:
    uses: ./.github/workflows/p2p-workflow-source-security-scan.yaml
    with:
      secret-scan-scope: full-history
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
      fail-on-non-blocking-findings: ${{ inputs.security-scan-fail-on-non-blocking-findings }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.checkout-version }}
      timeout-minutes: ${{ inputs.timeout-minutes }}

  # Resolve a single anchor image used to look up the latest version per
  # stage. All p2p images in a release share the same version, so any image
  # works.
  security-resolve-anchor-image:
    name: security-resolve-anchor-image
    if: inputs.security-scan-enabled
    runs-on: ubuntu-24.04
    outputs:
      image-name: ${{ steps.pick.outputs.image-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.dry-run == false && inputs.checkout-version || '' }}
      - id: pick
        name: Pick anchor image
        shell: bash
        env:
          IMAGE_NAMES: ${{ inputs.image-names }}
          WORKING_DIR: ${{ inputs.working-directory }}
          P2P_TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
          P2P_APP_NAME: ${{ inputs.app-name }}
        run: |
          set -euo pipefail
          if [ -n "${IMAGE_NAMES//[[:space:],]/}" ]; then
            anchor=$(printf '%s' "$IMAGE_NAMES" | tr ',\n' '  ' | awk 'NF { print $1; exit }')
          else
            if [ -z "${P2P_TENANT_NAME:-}" ]; then unset P2P_TENANT_NAME; fi
            if [ -z "${P2P_APP_NAME:-}" ]; then unset P2P_APP_NAME; fi
            anchor=$(make --no-print-directory -C "$WORKING_DIR" p2p-images | awk 'NF { print $1; exit }')
          fi
          if [ -z "$anchor" ]; then
            echo "::error::No anchor image found (image-names empty and 'make p2p-images' returned nothing)."
            exit 1
          fi
          echo "image-name=$anchor" >> "$GITHUB_OUTPUT"
          echo "Anchor image for version discovery: $anchor"

  security-image-scan-fast-feedback:
    needs: [security-resolve-anchor-image]
    if: inputs.security-scan-enabled
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.FAST_FEEDBACK) }}
      fail-fast: false
    with:
      registry-path: fast-feedback
      pipeline-stage: fast-feedback
      tenant-name: ${{ inputs.tenant-name }}
      app-name: ${{ inputs.app-name }}
      image-name: ${{ needs.security-resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.checkout-version }}
      security-scan-blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
      security-scan-fail-on-non-blocking-findings: ${{ inputs.security-scan-fail-on-non-blocking-findings }}

  security-image-scan-extended-test:
    needs: [security-resolve-anchor-image]
    if: inputs.security-scan-enabled
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.EXTENDED_TEST) }}
      fail-fast: false
    with:
      registry-path: extended-test
      pipeline-stage: extended-test
      tenant-name: ${{ inputs.tenant-name }}
      app-name: ${{ inputs.app-name }}
      image-name: ${{ needs.security-resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.checkout-version }}
      security-scan-blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
      security-scan-fail-on-non-blocking-findings: ${{ inputs.security-scan-fail-on-non-blocking-findings }}

  security-image-scan-prod:
    needs: [security-resolve-anchor-image]
    if: inputs.security-scan-enabled
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.PROD) }}
      fail-fast: false
    with:
      registry-path: prod
      pipeline-stage: prod
      tenant-name: ${{ inputs.tenant-name }}
      app-name: ${{ inputs.app-name }}
      image-name: ${{ needs.security-resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.checkout-version }}
      security-scan-blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
      security-scan-fail-on-non-blocking-findings: ${{ inputs.security-scan-fail-on-non-blocking-findings }}
