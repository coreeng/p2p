on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
    inputs:
      tenant-name:
        required: false
        type: string
        default: ''
      image-names:
        description: |
          Newline- or comma-separated list of image names. The first entry is
          used as the version-lookup anchor for each stage, and the full list
          is passed to image-scan. If empty, image-scan falls back to repository
          discovery.
        required: false
        type: string
        default: ''
      working-directory:
        required: false
        type: string
        default: '.'
      region:
        required: false
        type: string
        default: europe-west2
      dry-run:
        required: false
        type: boolean
        default: false
      timeout-minutes:
        required: false
        type: number
        default: 30

jobs:
  source-security-scan:
    uses: ./.github/workflows/p2p-workflow-source-security-scan.yaml
    with:
      scope: full-history
      blocking-severity: off
      dry-run: ${{ inputs.dry-run }}
      timeout-minutes: ${{ inputs.timeout-minutes }}

  # Resolve a single anchor image used to look up the latest version per
  # stage. All p2p images in a release share the same version, so any image
  # works.
  resolve-anchor-image:
    name: resolve-anchor-image
    runs-on: ubuntu-24.04
    outputs:
      image-name: ${{ steps.pick.outputs.image-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - id: pick
        name: Pick anchor image
        shell: bash
        env:
          IMAGE_NAMES: ${{ inputs.image-names }}
          WORKING_DIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          if [ -n "${IMAGE_NAMES//[[:space:],]/}" ]; then
            anchor=$(printf '%s' "$IMAGE_NAMES" | tr ',\n' '  ' | awk '{print $1}')
          else
            anchor=$(make --no-print-directory -C "$WORKING_DIR" p2p-images | awk '{print $1}')
          fi
          if [ -z "$anchor" ]; then
            echo "::error::No anchor image found (image-names empty and 'make p2p-images' returned nothing)."
            exit 1
          fi
          echo "image-name=$anchor" >> "$GITHUB_OUTPUT"
          echo "Anchor image for version discovery: $anchor"

  image-scan-fast-feedback:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.FAST_FEEDBACK) }}
      fail-fast: false
    with:
      registry-path: fast-feedback
      pipeline-stage: fast-feedback
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}

  image-scan-extended-test:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.EXTENDED_TEST) }}
      fail-fast: false
    with:
      registry-path: extended-test
      pipeline-stage: extended-test
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}

  image-scan-prod:
    needs: [resolve-anchor-image]
    uses: ./.github/workflows/p2p-workflow-security-image-scan-stage.yaml
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(vars.PROD) }}
      fail-fast: false
    with:
      registry-path: prod
      pipeline-stage: prod
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ needs.resolve-anchor-image.outputs.image-name }}
      image-names: ${{ inputs.image-names }}
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
