on:
  workflow_call:
    inputs:
      scope:
        required: true
        type: string
      fail-on-findings:
        required: false
        type: boolean
        default: false
      timeout-minutes:
        required: false
        type: number
        default: 30

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scan-range
        name: Determine scan range
        if: inputs.scope == 'changes'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # PR scan: diff PR branch against the target branch tip
            echo "base=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            # Push scan: diff the exact range that was just pushed
            echo "base=$PUSH_BEFORE_SHA" >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            # Fallback (e.g. workflow_dispatch, tags, brand-new branch): scan the latest commit
            echo "base=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          else
            # Initial commit with no parent: scan just the single commit at HEAD
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install TruffleHog
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.95.3/scripts/install.sh \
            | sh -s -- -b "$RUNNER_TEMP" v3.95.3
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - id: scan
        name: TruffleHog OSS secrets scan
        shell: bash
        continue-on-error: true
        env:
          SCOPE: ${{ inputs.scope }}
          BASE: ${{ steps.scan-range.outputs.base }}
        run: |
          set +e
          # Collect every finding regardless of verification state; the
          # blocking decision is taken downstream by classifying each
          # finding (verified / unknown / unverified) from the JSON.
          ARGS=(git "file://$GITHUB_WORKSPACE" --json "--results=verified,unverified,unknown" --no-update)
          if [ "$SCOPE" = "changes" ]; then
            ARGS+=(--branch=HEAD)
            if [ -n "$BASE" ]; then
              ARGS+=(--since-commit="$BASE")
            fi
          fi
          trufflehog "${ARGS[@]}" > "$RUNNER_TEMP/trufflehog-findings.ndjson"
          echo "findings_file=$RUNNER_TEMP/trufflehog-findings.ndjson" >> "$GITHUB_OUTPUT"
          exit 0

      - id: report
        name: Build redacted report
        if: always()
        shell: bash
        env:
          FINDINGS: ${{ steps.scan.outputs.findings_file }}
          SCOPE: ${{ inputs.scope }}
          BASE: ${{ steps.scan-range.outputs.base }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/trufflehog-report.md"
          body="$RUNNER_TEMP/trufflehog-body.md"
          comment="$RUNNER_TEMP/trufflehog-comment.md"

          total=0
          blocking=0
          if [ -s "$FINDINGS" ]; then
            total=$(wc -l < "$FINDINGS" | tr -d ' ')
            # Only verified findings block. Unverified and unknown
            # findings are reported in the summary, comment, and JSON
            # artifact but do not fail the job. See ADR-0001 for the
            # rationale (non-determinism of unknown and verifier-bucket
            # conflation in unverified).
            blocking=$(jq -s '[
              .[] | select(.Verified == true)
            ] | length' "$FINDINGS")
          fi

          {
            if [ "$total" -eq 0 ]; then
              echo "✅ No secrets detected."
            else
              if [ "$blocking" -gt 0 ]; then
                echo "❌ $total finding(s) detected ($blocking blocking)."
              else
                echo "⚠️ $total finding(s) detected (none blocking)."
              fi
              echo
              echo "| Detector | Status | File | Line | Commit |"
              echo "| --- | --- | --- | --- | --- |"
              jq -r \
                --arg server "$SERVER_URL" \
                --arg repo "$REPOSITORY" '
                (
                  if .Verified == true then "verified"
                  elif (.VerificationError // null) != null then "unknown"
                  else "unverified"
                  end
                ) as $status |
                (.SourceMetadata.Data.Git.commit // "") as $commit |
                (.SourceMetadata.Data.Git.file // "") as $file |
                (.SourceMetadata.Data.Git.line // "") as $line |
                ($file | split("/") | map(@uri) | join("/")) as $file_uri |
                ($file | gsub("[\r\n]"; "") | gsub("\\|"; "\\\\|")) as $file_md |
                (
                  if $commit == "" then "n/a"
                  else
                    "[" + ($commit | .[0:12]) + "]("
                      + $server + "/" + $repo + "/blob/" + $commit
                      + (if $file == "" then "" else "/" + $file_uri end)
                      + (if $line == "" then "" else "#L" + ($line | tostring) end)
                      + ")"
                  end
                ) as $commit_cell |
                [
                  (.DetectorName // "n/a"),
                  $status,
                  (if $file == "" then "n/a" else $file_md end),
                  (if $line == "" then "n/a" else ($line | tostring) end),
                  $commit_cell
                ] | "| " + join(" | ") + " |"
              ' "$FINDINGS"
            fi
          } > "$body"

          {
            echo "## TruffleHog secrets scan"
            echo
            if [ "$SCOPE" = "changes" ]; then
              echo "Scan range: \`${BASE:-<initial>}..HEAD\`"
            else
              echo "Scan range: \`<full history>\`"
            fi
            echo
            cat "$body"
          } > "$report"

          {
            echo "## Secrets scan"
            echo
            cat "$body"
          } > "$comment"

          {
            echo "report_file=$report"
            echo "comment_file=$comment"
            echo "blocking_count=$blocking"
          } >> "$GITHUB_OUTPUT"

      - id: json
        name: Build JSON findings
        if: always()
        shell: bash
        env:
          FINDINGS: ${{ steps.scan.outputs.findings_file }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          out_json="$RUNNER_TEMP/trufflehog-findings.json"
          if [ ! -s "$FINDINGS" ]; then
            echo "[]" > "$out_json"
          else
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              detector=$(jq -r '.DetectorName // ""' <<< "$line")
              raw=$(jq -r '.Raw // ""' <<< "$line")
              id=$(printf '%s\0%s' "$detector" "$raw" | sha256sum | cut -d' ' -f1)
              jq -c \
                --arg id "$id" \
                --arg server "$SERVER_URL" \
                --arg repo "$REPOSITORY" '
                (.SourceMetadata.Data.Git.commit // "") as $commit |
                (.SourceMetadata.Data.Git.file // "") as $file |
                (.SourceMetadata.Data.Git.line // "") as $ln |
                ($file | split("/") | map(@uri) | join("/")) as $file_uri |
                {
                  id: $id,
                  detector: (.DetectorName // null),
                  status: (
                    if .Verified == true then "verified"
                    elif (.VerificationError // null) != null then "unknown"
                    else "unverified"
                    end
                  ),
                  file: (if $file == "" then null else $file end),
                  line: (if $ln == "" then null else $ln end),
                  commit: (if $commit == "" then null else $commit end),
                  url: (
                    if $commit == "" then null
                    else
                      $server + "/" + $repo + "/blob/" + $commit
                        + (if $file == "" then "" else "/" + $file_uri end)
                        + (if $ln == "" then "" else "#L" + ($ln | tostring) end)
                    end
                  )
                }
              ' <<< "$line"
            done < "$FINDINGS" | jq -s '.' > "$out_json"
          fi
          echo "json_file=$out_json" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        if: always()
        shell: bash
        env:
          REPORT: ${{ steps.report.outputs.report_file }}
        run: cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert sticky PR comment
        if: always() && github.event_name == 'pull_request'
        # Non-fatal: when the caller has not granted pull-requests: write the
        # GitHub API returns 403 and we skip silently rather than fail the job.
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: trufflehog-findings
          path: ${{ steps.report.outputs.comment_file }}

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings
          path: ${{ steps.json.outputs.json_file }}

      - name: Enforce scan policy
        if: inputs.fail-on-findings
        shell: bash
        env:
          BLOCKING: ${{ steps.report.outputs.blocking_count }}
        run: |
          if [ "${BLOCKING:-0}" -gt 0 ]; then
            echo "::error::$BLOCKING blocking secret finding(s) detected."
            exit 1
          fi
