name: p2p-command

on:
  workflow_call:
    secrets:
      env_vars:
        required: false
    outputs:
      version:
        description: "The latest image in the registry"
        value: ${{ jobs.get-latest-image.outputs.version }}
    inputs:
      registry-path:
        required: false
        type: string
        default: 'extended-test'
      tenant-name:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
      region:
        required: false
        type: string
        default: europe-west2
      working-directory:
        required: false
        type: string
        default: '.'
      environment:
        required: true
        type: string

jobs:
  get-latest-image:
    name: get-latest-image
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get-latest-image.outputs.version }}
    environment: ${{ fromJSON(startsWith(inputs.environment, '{') && inputs.environment || format('{"include":[{"deploy_env":"{0}"}]}', inputs.environment)).include[0]['deploy_env'] }}
    env:
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
      INTERNAL_SERVICES_DOMAIN: ${{ vars.INTERNAL_SERVICES_DOMAIN }}
      DPLATFORM: ${{ vars.DPLATFORM }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION || inputs.region }}
      REGISTRY: ${{ vars.REGION || inputs.region }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/tenant/${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      SERVICE_ACCOUNT: p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
      ENV_NAME: ${{ fromJSON(startsWith(inputs.environment, '{') && inputs.environment || format('{"include":[{"deploy_env":"{0}"}]}', inputs.environment)).include[0]['deploy_env'] }}
      TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      WORKLOAD_IDENTITY_PROVIDER: projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}/providers/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      REGISTRY_PATH: ${{ inputs.registry-path }}
      IMAGE_NAME: ${{ inputs.image-name }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: print env context
        run: |
          yq 'del(.env_vars)' -p=json -C <<EOT
          ${{ toJSON(env) }}
          EOT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate environment reader token
        id: env-token
        if: ${{ !hashFiles('.p2p.yaml') && secrets.P2P_ENV_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.P2P_ENV_APP_ID }}
          private-key: ${{ secrets.P2P_ENV_APP_PRIVATE_KEY }}
          owner: coreeng
          repositories: core-platform-environments

      - name: Checkout environment config
        if: ${{ steps.env-token.outputs.token != '' }}
        uses: actions/checkout@v4
        with:
          repository: coreeng/core-platform-environments
          token: ${{ steps.env-token.outputs.token }}
          path: /tmp/core-platform-environments
          sparse-checkout: |
            environments/${{ env.ENV_NAME }}

      - name: Resolve environment config
        run: |
          set -euo pipefail
          ENV_NAME="${{ env.ENV_NAME }}"
          CONFIG=""

          # Mode 1: .p2p.yaml in tenant repo
          if [ -f .p2p.yaml ] && yq -e ".environments.${ENV_NAME}" .p2p.yaml > /dev/null 2>&1; then
            echo "::notice::Resolving environment config from .p2p.yaml (${ENV_NAME})"
            CONFIG=$(yq ".environments.${ENV_NAME}" .p2p.yaml)

          # Mode 2: core-platform-environments (if checked out)
          elif [ -f "/tmp/core-platform-environments/environments/${ENV_NAME}/config.yaml" ]; then
            echo "::notice::Resolving environment config from core-platform-environments (${ENV_NAME})"
            CONFIG=$(cat "/tmp/core-platform-environments/environments/${ENV_NAME}/config.yaml")
          fi

          # Apply config if resolved (otherwise vars.* defaults remain)
          if [ -n "$CONFIG" ]; then
            PROJECT_ID=$(echo "$CONFIG" | yq '.platform.projectId')
            PROJECT_NUMBER=$(echo "$CONFIG" | yq '.platform.projectNumber')
            REGION=$(echo "$CONFIG" | yq '.platform.region')
            TENANT_NAME="${{ env.TENANT_NAME }}"

            echo "PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"
            echo "PROJECT_NUMBER=${PROJECT_NUMBER}" >> "$GITHUB_ENV"
            echo "REGION=${REGION}" >> "$GITHUB_ENV"
            echo "REGISTRY=${REGION}-docker.pkg.dev/${PROJECT_ID}/tenant/${TENANT_NAME}" >> "$GITHUB_ENV"
            echo "SERVICE_ACCOUNT=p2p-${TENANT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" >> "$GITHUB_ENV"
            echo "WORKLOAD_IDENTITY_PROVIDER=projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/p2p-${TENANT_NAME}/providers/p2p-${TENANT_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Authenticate to Google Cloud
        id: auth
        if: inputs.dry-run == false
        uses: google-github-actions/auth@v3
        with:
          export_environment_variables: true
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Get latest image
        id: get-latest-image
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        working-directory: ${{ inputs.working-directory }}
        run: |
            set -o pipefail
            [ $DRY_RUN == false ] && version=$(gcloud artifacts docker images list ${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME} --include-tags --sort-by=~buildTime --format=json 2>/dev/null | jq -r '.[].tags[]' | jq -Rrn '[inputs] | sort_by(
              # extract name and version
              match("[0-9]+[0-9.]*";"").offset as $version_index
              | .[:$version_index] as $name
              | .[$version_index:]
              # ignore build
              | split("+")[0]
              # extract version core and pre-release as arrays of numbers and strings
              | split("-")
              | (.[0] | split(".") | map(tonumber? // .)) as $version_core
              | (.[1:] | join("-") | split(".") | map(tonumber? // .)) as $pre_release
              # sort by name
              | $name,
              # sort by version core
              $version_core,
              # pre-release versions have a lower precedence than the associated normal version
              ($pre_release | length)==0,
              # sort by pre-release
              $pre_release
            ) | reverse | .[0]')
            [ $? -gt 0 ] && [ $DRY_RUN == false ] && echo "exiting" && exit 1
            [ $DRY_RUN == true ] && version="0.0.0"
            echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: "Output version: ${{ steps.get-latest-image.outputs.version }}"
        id: outputversion
        shell: bash
        run: |
          echo "Output version: ${{ steps.get-latest-image.outputs.version }}"
