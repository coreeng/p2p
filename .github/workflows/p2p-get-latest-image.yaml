name: p2p-command

on:
  workflow_call:
    secrets:
      env_vars:
        required: false
    outputs:
      version:
        description: "The latest image in the registry"
        value: ${{ jobs.get-latest-image.outputs.version }}
    inputs:
      registry-path:
        required: false
        type: string
        default: 'extended-test'
      tenant-name:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
      region:
        required: false
        type: string
        default: europe-west2
      working-directory:
        required: false
        type: string
        default: '.'
      environment:
        required: true
        type: string
      env-config-file:
        description: 'Tenant repo config file for environment resolution (e.g. .p2p.yaml)'
        required: false
        type: string
      env-config-repo:
        description: 'Central repo name for environment config'
        required: false
        type: string
      env-config-repo-owner:
        description: 'Owner of the central environment config repo'
        required: false
        type: string
      env-config-path-pattern:
        description: 'Path pattern in central repo (use {env} as placeholder)'
        required: false
        type: string

jobs:
  get-latest-image:
    name: get-latest-image
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get-latest-image.outputs.version }}
    environment: ${{ fromJSON(startsWith(inputs.environment, '{') && inputs.environment || format('{"include":[{"deploy_env":"{0}"}]}', inputs.environment)).include[0]['deploy_env'] }}
    env:
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
      INTERNAL_SERVICES_DOMAIN: ${{ vars.INTERNAL_SERVICES_DOMAIN }}
      DPLATFORM: ${{ vars.DPLATFORM }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION || inputs.region }}
      REGISTRY: ${{ vars.REGION || inputs.region }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/tenant/${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      SERVICE_ACCOUNT: p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
      ENV_NAME: ${{ fromJSON(startsWith(inputs.environment, '{') && inputs.environment || format('{"include":[{"deploy_env":"{0}"}]}', inputs.environment)).include[0]['deploy_env'] }}
      TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      WORKLOAD_IDENTITY_PROVIDER: projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}/providers/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      REGISTRY_PATH: ${{ inputs.registry-path }}
      IMAGE_NAME: ${{ inputs.image-name }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: print env context
        run: |
          yq 'del(.env_vars)' -p=json -C <<EOT
          ${{ toJSON(env) }}
          EOT

      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate environment reader token
        id: env-token
        if: ${{ inputs.env-config-repo != '' && inputs.env-config-repo-owner != '' && secrets.P2P_ENV_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.P2P_ENV_APP_ID }}
          private-key: ${{ secrets.P2P_ENV_APP_PRIVATE_KEY }}
          owner: ${{ inputs.env-config-repo-owner }}
          repositories: ${{ inputs.env-config-repo }}

      - name: Checkout central environment config
        if: ${{ steps.env-token.outputs.token != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.env-config-repo-owner }}/${{ inputs.env-config-repo }}
          token: ${{ steps.env-token.outputs.token }}
          path: /tmp/${{ inputs.env-config-repo }}
          sparse-checkout: |
            ${{ format(inputs.env-config-path-pattern, env.ENV_NAME) }}

      - name: Resolve config from central repo
        id: central-config
        if: ${{ steps.env-token.outputs.token != '' }}
        env:
          ENV_CONFIG_REPO: ${{ inputs.env-config-repo }}
          ENV_CONFIG_PATH_PATTERN: ${{ inputs.env-config-path-pattern }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ env.ENV_NAME }}"
          CENTRAL_CONFIG_PATH="/tmp/${ENV_CONFIG_REPO}/${ENV_CONFIG_PATH_PATTERN/\{env\}/${ENV_NAME}}"
          if [ -f "${CENTRAL_CONFIG_PATH}" ]; then
            echo "::notice::Resolving environment config from ${ENV_CONFIG_REPO} (${ENV_NAME})"
            cp "${CENTRAL_CONFIG_PATH}" /tmp/resolved-env-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply central repo config
        if: ${{ steps.central-config.outputs.resolved == 'true' }}
        run: |
          set -euo pipefail
          CONFIG=$(cat /tmp/resolved-env-config.yaml)

          for pair in \
            "PROJECT_ID:.platform.projectId" \
            "PROJECT_NUMBER:.platform.projectNumber" \
            "REGION:.platform.region"; do
            key="${pair%%:*}"
            path="${pair#*:}"
            val=$(echo "$CONFIG" | yq "${path} // empty")
            [ -n "$val" ] && echo "${key}=${val}" >> "$GITHUB_ENV"
          done

      - name: Resolve config from tenant repo file
        id: tenant-config
        if: ${{ inputs.env-config-file != '' }}
        env:
          ENV_CONFIG_FILE: ${{ inputs.env-config-file }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ env.ENV_NAME }}"
          if [ -f "${ENV_CONFIG_FILE}" ] && yq -e ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /dev/null 2>&1; then
            echo "::notice::Resolving environment config from ${ENV_CONFIG_FILE} (${ENV_NAME})"
            yq ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /tmp/resolved-tenant-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply tenant repo config
        if: ${{ steps.tenant-config.outputs.resolved == 'true' }}
        run: |
          set -euo pipefail
          CONFIG=$(cat /tmp/resolved-tenant-config.yaml)

          for pair in \
            "PROJECT_ID:.platform.projectId" \
            "PROJECT_NUMBER:.platform.projectNumber" \
            "REGION:.platform.region"; do
            key="${pair%%:*}"
            path="${pair#*:}"
            val=$(echo "$CONFIG" | yq "${path} // empty")
            [ -n "$val" ] && echo "${key}=${val}" >> "$GITHUB_ENV"
          done

      - name: Recompute derived env vars
        if: ${{ steps.central-config.outputs.resolved == 'true' || steps.tenant-config.outputs.resolved == 'true' }}
        run: |
          echo "REGISTRY=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/tenant/${{ env.TENANT_NAME }}" >> "$GITHUB_ENV"
          echo "SERVICE_ACCOUNT=p2p-${{ env.TENANT_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" >> "$GITHUB_ENV"
          echo "WORKLOAD_IDENTITY_PROVIDER=projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ env.TENANT_NAME }}/providers/p2p-${{ env.TENANT_NAME }}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        id: auth
        if: inputs.dry-run == false
        uses: google-github-actions/auth@v3
        with:
          export_environment_variables: true
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Get latest image
        id: get-latest-image
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        working-directory: ${{ inputs.working-directory }}
        run: |
            set -o pipefail
            [ $DRY_RUN == false ] && version=$(gcloud artifacts docker images list ${REGISTRY}/${REGISTRY_PATH}/${IMAGE_NAME} --include-tags --sort-by=~buildTime --format=json 2>/dev/null | jq -r '.[].tags[]' | jq -Rrn '[inputs] | sort_by(
              # extract name and version
              match("[0-9]+[0-9.]*";"").offset as $version_index
              | .[:$version_index] as $name
              | .[$version_index:]
              # ignore build
              | split("+")[0]
              # extract version core and pre-release as arrays of numbers and strings
              | split("-")
              | (.[0] | split(".") | map(tonumber? // .)) as $version_core
              | (.[1:] | join("-") | split(".") | map(tonumber? // .)) as $pre_release
              # sort by name
              | $name,
              # sort by version core
              $version_core,
              # pre-release versions have a lower precedence than the associated normal version
              ($pre_release | length)==0,
              # sort by pre-release
              $pre_release
            ) | reverse | .[0]')
            [ $? -gt 0 ] && [ $DRY_RUN == false ] && echo "exiting" && exit 1
            [ $DRY_RUN == true ] && version="0.0.0"
            echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: "Output version: ${{ steps.get-latest-image.outputs.version }}"
        id: outputversion
        shell: bash
        run: |
          echo "Output version: ${{ steps.get-latest-image.outputs.version }}"
