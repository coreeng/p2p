name: CI — resolve-platform-config

on:
  pull_request:
    paths:
      - '.github/actions/resolve-platform-config/**'

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .github/actions/resolve-platform-config
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify dist is up to date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is out of date — run 'npm run build' and commit" && exit 1)
