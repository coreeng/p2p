name: p2p-command

on:
  workflow_call:
    secrets:
      env_vars:
        required: false
    inputs:
      promotion-stage:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
      source_matrix:
        required: true
        type: string
      dest_github_env:
        required: true
        type: string
      app-name:
        required: false
        type: string
        default: ''
      tenant-name:
        required: false
        type: string
        default: ''
      version:
        required: false
        type: string
        default: ''
      region:
        required: false
        type: string
        default: europe-west2
      working-directory:
        required: false
        type: string
        default: '.'
      checkout-version:
        required: false
        type: string
      env-config-file:
        description: 'Tenant repo config file for environment resolution (e.g. .p2p.yaml)'
        required: false
        type: string
      env-config-repo:
        description: 'Central repo name for environment config'
        required: false
        type: string
      env-config-repo-owner:
        description: 'Owner of the central environment config repo'
        required: false
        type: string
      env-config-path-pattern:
        description: 'Path pattern in central repo (use {env} as placeholder)'
        required: false
        type: string

jobs:
  lookup:
    runs-on: ubuntu-24.04
    environment: ${{ fromJSON(startsWith(inputs.source_matrix, '{') && inputs.source_matrix || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source_matrix)).include[0]['deploy_env'] }}
    env:
      ENV_NAME: ${{ fromJSON(startsWith(inputs.source_matrix, '{') && inputs.source_matrix || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source_matrix)).include[0]['deploy_env'] }}
      TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      REGISTRY: ${{ vars.REGION || inputs.region }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/tenant/${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      SERVICE_ACCOUNT: p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
      WORKLOAD_IDENTITY_PROVIDER: projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}/providers/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
    outputs:
      source_registry: ${{ steps.export.outputs.registry }}
      source_project_id: ${{ steps.export.outputs.project_id }}
      source_service_account: ${{ steps.export.outputs.service_account }}
      source_workflow_identity_provider: ${{ steps.export.outputs.workload_identity_provider }}
    steps:
      - name: print env context
        run: |
          yq 'del(.env_vars)' -p=json -C <<EOT
          ${{ toJSON(env) }}
          EOT

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve source config from tenant repo file
        id: tenant-config
        if: ${{ inputs.env-config-file != '' }}
        env:
          ENV_CONFIG_FILE: ${{ inputs.env-config-file }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ env.ENV_NAME }}"
          if [ -f "${ENV_CONFIG_FILE}" ] && yq -e ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /dev/null 2>&1; then
            echo "::notice::Resolving source environment config from ${ENV_CONFIG_FILE} (${ENV_NAME})"
            yq ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /tmp/resolved-env-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate environment reader token
        id: env-token
        if: ${{ steps.tenant-config.outputs.resolved != 'true' && inputs.env-config-repo != '' && inputs.env-config-repo-owner != '' && secrets.P2P_ENV_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.P2P_ENV_APP_ID }}
          private-key: ${{ secrets.P2P_ENV_APP_PRIVATE_KEY }}
          owner: ${{ inputs.env-config-repo-owner }}
          repositories: ${{ inputs.env-config-repo }}

      - name: Checkout central environment config
        if: ${{ steps.env-token.outputs.token != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.env-config-repo-owner }}/${{ inputs.env-config-repo }}
          token: ${{ steps.env-token.outputs.token }}
          path: /tmp/${{ inputs.env-config-repo }}
          sparse-checkout: |
            ${{ format(inputs.env-config-path-pattern, env.ENV_NAME) }}

      - name: Resolve source config from central repo
        id: central-config
        if: ${{ steps.tenant-config.outputs.resolved != 'true' && steps.env-token.outputs.token != '' }}
        env:
          ENV_CONFIG_REPO: ${{ inputs.env-config-repo }}
          ENV_CONFIG_PATH_PATTERN: ${{ inputs.env-config-path-pattern }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ env.ENV_NAME }}"
          CENTRAL_CONFIG_PATH="/tmp/${ENV_CONFIG_REPO}/${ENV_CONFIG_PATH_PATTERN/\{env\}/${ENV_NAME}}"
          if [ -f "${CENTRAL_CONFIG_PATH}" ]; then
            echo "::notice::Resolving source environment config from ${ENV_CONFIG_REPO} (${ENV_NAME})"
            cp "${CENTRAL_CONFIG_PATH}" /tmp/resolved-env-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply resolved source environment config
        if: ${{ steps.tenant-config.outputs.resolved == 'true' || steps.central-config.outputs.resolved == 'true' }}
        run: |
          set -euo pipefail
          CONFIG=$(cat /tmp/resolved-env-config.yaml)
          TENANT_NAME="${{ env.TENANT_NAME }}"
          PROJECT_ID=$(echo "$CONFIG" | yq '.platform.projectId')
          PROJECT_NUMBER=$(echo "$CONFIG" | yq '.platform.projectNumber')
          REGION=$(echo "$CONFIG" | yq '.platform.region')

          echo "PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "PROJECT_NUMBER=${PROJECT_NUMBER}" >> "$GITHUB_ENV"
          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGION}-docker.pkg.dev/${PROJECT_ID}/tenant/${TENANT_NAME}" >> "$GITHUB_ENV"
          echo "SERVICE_ACCOUNT=p2p-${TENANT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" >> "$GITHUB_ENV"
          echo "WORKLOAD_IDENTITY_PROVIDER=projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/p2p-${TENANT_NAME}/providers/p2p-${TENANT_NAME}" >> "$GITHUB_ENV"

      - name: Export resolved source config
        id: export
        run: |
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "service_account=${SERVICE_ACCOUNT}" >> "$GITHUB_OUTPUT"
          echo "workload_identity_provider=${WORKLOAD_IDENTITY_PROVIDER}" >> "$GITHUB_OUTPUT"

  promote-image:
    name: promote-to-${{ inputs.promotion-stage }}
    runs-on: ubuntu-24.04
    needs: [lookup]
    environment: ${{ inputs.dest_github_env }}
    env:
      env_vars: ${{ secrets.env_vars }}
      BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
      INTERNAL_SERVICES_DOMAIN: ${{ vars.INTERNAL_SERVICES_DOMAIN }}
      DEST_GITHUB_ENV: ${{ inputs.dest_github_env }}
      DPLATFORM: ${{ vars.DPLATFORM }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION || inputs.region }}
      REGISTRY: ${{ vars.REGION || inputs.region }}-docker.pkg.dev/${{ vars.PROJECT_ID }}/tenant/${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      SERVICE_ACCOUNT: p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
      VERSION: ${{ inputs.version }}
      SOURCE_GITHUB_ENV: ${{ fromJSON(startsWith(inputs.source_matrix, '{') && inputs.source_matrix || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source_matrix)).include[0]['deploy_env'] }}
      SOURCE_PROJECT_ID: ${{ needs.lookup.outputs.source_project_id }}
      SOURCE_REGISTRY: ${{ needs.lookup.outputs.source_registry }}
      SOURCE_SERVICE_ACCOUNT: ${{ needs.lookup.outputs.source_service_account }}
      SOURCE_WORKLOAD_IDENTITY_PROVIDER: ${{ needs.lookup.outputs.source_workflow_identity_provider }}
      TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      WORKLOAD_IDENTITY_PROVIDER: projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}/providers/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: print env context
        run: |
          yq 'del(.env_vars)' -p=json -C <<EOT
          ${{ toJSON(env) }}
          EOT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.dry-run == false && inputs.checkout-version || '' }}

      - name: Resolve dest config from tenant repo file
        id: tenant-config
        if: ${{ inputs.env-config-file != '' }}
        env:
          ENV_CONFIG_FILE: ${{ inputs.env-config-file }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ inputs.dest_github_env }}"
          if [ -f "${ENV_CONFIG_FILE}" ] && yq -e ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /dev/null 2>&1; then
            echo "::notice::Resolving destination environment config from ${ENV_CONFIG_FILE} (${ENV_NAME})"
            yq ".environments.${ENV_NAME}" "${ENV_CONFIG_FILE}" > /tmp/resolved-env-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate environment reader token
        id: env-token
        if: ${{ steps.tenant-config.outputs.resolved != 'true' && inputs.env-config-repo != '' && inputs.env-config-repo-owner != '' && secrets.P2P_ENV_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.P2P_ENV_APP_ID }}
          private-key: ${{ secrets.P2P_ENV_APP_PRIVATE_KEY }}
          owner: ${{ inputs.env-config-repo-owner }}
          repositories: ${{ inputs.env-config-repo }}

      - name: Checkout central environment config
        if: ${{ steps.env-token.outputs.token != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.env-config-repo-owner }}/${{ inputs.env-config-repo }}
          token: ${{ steps.env-token.outputs.token }}
          path: /tmp/${{ inputs.env-config-repo }}
          sparse-checkout: |
            ${{ format(inputs.env-config-path-pattern, inputs.dest_github_env) }}

      - name: Resolve dest config from central repo
        id: central-config
        if: ${{ steps.tenant-config.outputs.resolved != 'true' && steps.env-token.outputs.token != '' }}
        env:
          ENV_CONFIG_REPO: ${{ inputs.env-config-repo }}
          ENV_CONFIG_PATH_PATTERN: ${{ inputs.env-config-path-pattern }}
        run: |
          set -euo pipefail
          ENV_NAME="${{ inputs.dest_github_env }}"
          CENTRAL_CONFIG_PATH="/tmp/${ENV_CONFIG_REPO}/${ENV_CONFIG_PATH_PATTERN/\{env\}/${ENV_NAME}}"
          if [ -f "${CENTRAL_CONFIG_PATH}" ]; then
            echo "::notice::Resolving destination environment config from ${ENV_CONFIG_REPO} (${ENV_NAME})"
            cp "${CENTRAL_CONFIG_PATH}" /tmp/resolved-env-config.yaml
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply resolved destination environment config
        if: ${{ steps.tenant-config.outputs.resolved == 'true' || steps.central-config.outputs.resolved == 'true' }}
        run: |
          set -euo pipefail
          CONFIG=$(cat /tmp/resolved-env-config.yaml)
          ENV_NAME="${{ inputs.dest_github_env }}"
          TENANT_NAME="${{ env.TENANT_NAME }}"
          PROJECT_ID=$(echo "$CONFIG" | yq '.platform.projectId')
          PROJECT_NUMBER=$(echo "$CONFIG" | yq '.platform.projectNumber')
          REGION=$(echo "$CONFIG" | yq '.platform.region')

          echo "PROJECT_ID=${PROJECT_ID}" >> "$GITHUB_ENV"
          echo "PROJECT_NUMBER=${PROJECT_NUMBER}" >> "$GITHUB_ENV"
          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "BASE_DOMAIN=$(echo "$CONFIG" | yq '.ingressDomains[0].domain')" >> "$GITHUB_ENV"
          echo "INTERNAL_SERVICES_DOMAIN=$(echo "$CONFIG" | yq '.internalServices.domain')" >> "$GITHUB_ENV"
          echo "DPLATFORM=${ENV_NAME}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGION}-docker.pkg.dev/${PROJECT_ID}/tenant/${TENANT_NAME}" >> "$GITHUB_ENV"
          echo "SERVICE_ACCOUNT=p2p-${TENANT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com" >> "$GITHUB_ENV"
          echo "WORKLOAD_IDENTITY_PROVIDER=projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/p2p-${TENANT_NAME}/providers/p2p-${TENANT_NAME}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (Source)
        id: auth-source
        if: inputs.dry-run == false
        uses: google-github-actions/auth@v3
        with:
          export_environment_variables: false
          workload_identity_provider: ${{ env.SOURCE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SOURCE_SERVICE_ACCOUNT }}
          project_id: ${{ env.SOURCE_PROJECT_ID }}
          token_format: access_token
          access_token_lifetime: 3600s


      - name: Authenticate to Google Cloud (Dest)
        id: auth-dest
        if: inputs.dry-run == false
        uses: google-github-actions/auth@v3
        with:
          export_environment_variables: false
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Decode environment variables
        shell: bash
        run: |
          IFS=$'\n'
          for i in $env_vars; do
            i="${i%%=*}"="${i#*=}"
            echo "::add-mask::${i#*=}"
            printf '%s\n' "${i//\\/\\\\}" >> "${GITHUB_ENV}"
          done

      - name: Set p2p variables
        id: setup-p2p-variables
        run: |
          env | grep "^P2P_" | sort
          export P2P_TENANT_NAME="${{ env.TENANT_NAME }}"
          export P2P_APP_NAME=${{ inputs.app-name }}
          export P2P_VERSION=${{ inputs.version }}
          export P2P_REGISTRY=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/tenant/${{ env.TENANT_NAME }}
          export P2P_REGISTRY_FAST_FEEDBACK_PATH=fast-feedback
          export P2P_REGISTRY_EXTENDED_TEST_PATH=extended-test
          export P2P_REGISTRY_PROD_PATH=prod
          export P2P_REGISTRY_FAST_FEEDBACK=${P2P_REGISTRY}/${P2P_REGISTRY_FAST_FEEDBACK_PATH}
          export P2P_REGISTRY_EXTENDED_TEST=${P2P_REGISTRY}/${P2P_REGISTRY_EXTENDED_TEST_PATH}
          export P2P_REGISTRY_PROD=${P2P_REGISTRY}/${P2P_REGISTRY_PROD_PATH}
          if [[ "${{ env.TENANT_NAME }}" == "${{ inputs.app-name }}" ]]; then
            P2P_NAMESPACE="${{ env.TENANT_NAME }}"
          else
            P2P_NAMESPACE="${{ env.TENANT_NAME }}-${{ inputs.app-name }}"
          fi
          export P2P_NAMESPACE_FUNCTIONAL=${P2P_NAMESPACE}-functional
          export P2P_NAMESPACE_NFT=${P2P_NAMESPACE}-nft
          export P2P_NAMESPACE_INTEGRATION=${P2P_NAMESPACE}-integration
          export P2P_NAMESPACE_EXTENDED=${P2P_NAMESPACE}-extended
          export P2P_NAMESPACE_PROD=${P2P_NAMESPACE}-prod
          env | grep "^P2P_" | sort | tee "${GITHUB_ENV}"

      - name: Setup skopeo
        id: setup-skopeo
        if: ${{ inputs.dry-run == false }}
        env:
          SOURCE_ACCESS_TOKEN: ${{ steps.auth-source.outputs.access_token }}
          DEST_ACCESS_TOKEN: ${{ steps.auth-dest.outputs.access_token }}
        run: |
          skopeo login -u oauth2accesstoken --password-stdin "${SOURCE_REGISTRY}" < <(echo "${SOURCE_ACCESS_TOKEN}")
          skopeo login -u oauth2accesstoken --password-stdin "${REGISTRY}" < <(echo "${DEST_ACCESS_TOKEN}")

      - name: Promote to ${{ inputs.promotion-stage }}
        id: run-promotion
        if: ${{ inputs.dry-run == false }}
        working-directory: ${{ inputs.working-directory }}
        env:
          SOURCE_AUTH_OVERRIDE: ${{ steps.auth-source.outputs.credentials_file_path }}
          SOURCE_ACCESS_TOKEN: ${{ steps.auth-source.outputs.access_token }}
          DEST_AUTH_OVERRIDE: ${{ steps.auth-dest.outputs.credentials_file_path }}
          DEST_ACCESS_TOKEN: ${{ steps.auth-dest.outputs.access_token }}
        run: |
          make p2p-promote-to-${{ inputs.promotion-stage }}
