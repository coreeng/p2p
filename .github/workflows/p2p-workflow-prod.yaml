on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
      slack_webhook_url:
        required: false
    inputs:
      source:
        required: false
        type: string
        default: ${{ vars.PROD }}
      dry-run:
        required: false
        type: boolean
        default: false
      main-branch:
          required: false
          type: string
          default: 'refs/heads/main'
      working-directory:
        required: false
        type: string
        default: '.'
      region:
        required: false
        type: string
        default: europe-west2
      app-name:
        required: false
        type: string
        default: ''
      tenant-name:
        required: false
        type: string
        default: ''
      version:
        required: false
        type: string
        default: ''
      version-prefix:
        required: false
        type: string
        default: 'v'
      skip-subnamespaces-create:
        description: |
          Skip creating subnamespaces
        required: false
        type: boolean
        default: false
      env-config-file:
        description: 'Tenant repo config file for environment resolution (e.g. .p2p.yaml)'
        required: false
        type: string
      env-config-repo:
        description: 'Central repo name for environment config'
        required: false
        type: string
      env-config-repo-owner:
        description: 'Owner of the central environment config repo'
        required: false
        type: string
      env-config-path-pattern:
        description: 'Path pattern in central repo (use {env} as placeholder)'
        required: false
        type: string

jobs:
  prod-deploy:
    name: prod-deploy
    if: success() && github.ref == inputs.main-branch
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-prod
      subnamespace: prod
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  notify-failure:
    needs: [prod-deploy]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "❌ P2P prod failed: *${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}* @ *${{ inputs.version }}*"
            app_name: "${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}"
            version: "${{ inputs.version }}"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-success:
    needs: [prod-deploy]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.ref == inputs.main-branch && needs.prod-deploy.result == 'success' && inputs.dry-run == false

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "✅ P2P prod succeeded: *${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}* @ *${{ inputs.version }}*"
            app_name: "${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}"
            version: "${{ inputs.version }}"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
