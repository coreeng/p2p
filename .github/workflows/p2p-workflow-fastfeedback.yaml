on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
      slack_webhook_url:
        required: false
    inputs:
      dry-run:
        required: false
        type: boolean
        default: false
      main-branch:
        required: false
        type: string
        default: 'refs/heads/main'
      checkout-version:
        required: false
        type: string
        default: ''
      app-name:
        required: false
        type: string
        default: ''
      tenant-name:
        required: false
        type: string
        default: ''
      version:
        required: true
        type: string
      region:
        required: false
        type: string
        default: europe-west2
      source:
        required: false
        type: string
        default: ${{ vars.FAST_FEEDBACK }}
      destination:
        required: false
        type: string
        default: ${{ vars.EXTENDED_TEST }}
      working-directory:
        required: false
        type: string
        default: '.'
      skip-fastfeedback-integration-on-prs:
        required: false
        type: boolean
        default: false
      skip-subnamespaces-create:
        description: |
          Skip creating subnamespaces
        required: false
        type: boolean
        default: false
      artifacts:
        required: false
        type: string
        default: ''
      env-config-file:
        description: 'Tenant repo config file for environment resolution (e.g. .p2p.yaml)'
        required: false
        type: string
      env-config-repo:
        description: 'Central repo name for environment config'
        required: false
        type: string
      env-config-repo-owner:
        description: 'Owner of the central environment config repo'
        required: false
        type: string
      env-config-path-pattern:
        description: 'Path pattern in central repo (use {env} as placeholder)'
        required: false
        type: string
    outputs:
      version:
        value: ${{ inputs.version }}

jobs:
  build:
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-build
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      checkout-version: ${{ inputs.checkout-version }}
      dry-run: ${{ inputs.dry-run }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  functional-test:
    needs: [build]
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-functional
      subnamespace: functional
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      checkout-version: ${{ inputs.checkout-version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  nft-test:
    needs: [build]
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-nft
      subnamespace: nft
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      checkout-version: ${{ inputs.checkout-version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  integration-test:
    needs: [functional-test, nft-test]
    if: success() && ( !inputs.skip-fastfeedback-integration-on-prs || github.ref == inputs.main-branch || github.ref_type == 'tag' )
    uses: ./.github/workflows/p2p-execute-command.yaml
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-integration
      subnamespace: integration
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      checkout-version: ${{ inputs.checkout-version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  promote:
    name: promote
    needs: [integration-test]
    if: success() && ( github.ref == inputs.main-branch || github.ref_type == 'tag' )
    secrets: inherit
    uses: ./.github/workflows/p2p-promote-image.yaml
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.destination, '{') && inputs.destination || format('{"include":[{"deploy_env":"{0}"}]}', inputs.destination)) }}
      fail-fast: false
    with:
      source_matrix: ${{ inputs.source }}
      dest_github_env: ${{ matrix.deploy_env }}
      region: ${{ inputs.region }}
      promotion-stage: extended-test
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      checkout-version: ${{ inputs.checkout-version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      env-config-file: ${{ inputs.env-config-file }}
      env-config-repo: ${{ inputs.env-config-repo }}
      env-config-repo-owner: ${{ inputs.env-config-repo-owner }}
      env-config-path-pattern: ${{ inputs.env-config-path-pattern }}

  notify-failure:
    needs: [build, functional-test, nft-test, integration-test, promote]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "❌ P2P fast-feedback failed: *${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}* @ *${{ inputs.version }}*"
            app_name: "${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}"
            version: "${{ inputs.version }}"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
