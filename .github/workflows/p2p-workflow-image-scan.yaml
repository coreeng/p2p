on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
    inputs:
      github_env:
        required: false
        type: string
        default: ''
      pipeline-stage:
        description: 'fast-feedback | extended-test | prod'
        required: true
        type: string
      version:
        required: true
        type: string
      tenant-name:
        required: false
        type: string
        default: ''
      region:
        required: false
        type: string
        default: europe-west2
      working-directory:
        required: false
        type: string
        default: '.'
      image-names:
        description: |
          Newline- or comma-separated list of standard P2P image names to scan
          before falling back to p2p-images.
        required: false
        type: string
        default: ''
      dry-run:
        required: false
        type: boolean
        default: false
      blocking-severity:
        required: false
        type: string
        default: 'off'
      ignore-unfixed:
        required: false
        type: boolean
        default: true
      timeout-minutes:
        required: false
        type: number
        default: 20
    outputs:
      json-file:
        value: ${{ jobs.image-scan.outputs.json-file }}

jobs:
  image-scan:
    name: image-scan (${{ inputs.github_env != '' && format('{0}, {1}', inputs.pipeline-stage, inputs.github_env) || inputs.pipeline-stage }})
    runs-on: ubuntu-24.04
    environment: ${{ inputs.github_env }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      json-file: ${{ steps.report.outputs.json-file }}
      total-count: ${{ steps.report.outputs.total-count }}
      blocking-count: ${{ steps.report.outputs.blocking-count }}
      secret-total-count: ${{ steps.report.outputs.secret-total-count }}
      secret-blocking-count: ${{ steps.report.outputs.secret-blocking-count }}
    env:
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REGION: ${{ vars.REGION || inputs.region }}
      VERSION: ${{ inputs.version }}
      SERVICE_ACCOUNT: p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}@${{ vars.PROJECT_ID }}.iam.gserviceaccount.com
      TENANT_NAME: ${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
      WORKLOAD_IDENTITY_PROVIDER: projects/${{ vars.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}/providers/p2p-${{ inputs.tenant-name != '' && inputs.tenant-name || vars.TENANT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        if: ${{ inputs.dry-run == false }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Login to Artifact Registry
        if: ${{ inputs.dry-run == false }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Login to tenant provided registry
        env:
          REGISTRY_USER: ${{ secrets.container_registry_user }}
          REGISTRY_PAT: ${{ secrets.container_registry_pat }}
          REGISTRY_URL: ${{ secrets.container_registry_url }}
        if: ${{ inputs.dry-run == false && env.REGISTRY_USER && env.REGISTRY_PAT }}
        run: |
          echo "${REGISTRY_PAT}" | docker login "${REGISTRY_URL}" -u "${REGISTRY_USER}" --password-stdin

      - id: resolve-images
        name: Resolve image references
        uses: actions/github-script@v9
        env:
          PIPELINE_STAGE: ${{ inputs.pipeline-stage }}
          WORKING_DIR: ${{ inputs.working-directory }}
          IMAGE_NAMES: ${{ inputs.image-names }}
        with:
          script: |
            const { execFileSync } = require('child_process');
            const stage = process.env.PIPELINE_STAGE;
            if (!['fast-feedback', 'extended-test', 'prod'].includes(stage)) {
              core.setFailed(`Unknown pipeline-stage '${stage}'. Expected: fast-feedback|extended-test|prod.`);
              return;
            }

            function runMake(target) {
              return execFileSync('make', ['--no-print-directory', target], {
                encoding: 'utf8',
                cwd: process.env.WORKING_DIR,
              });
            }

            function makeTargetExists(target) {
              try {
                execFileSync('make', ['--no-print-directory', '-q', target], {
                  cwd: process.env.WORKING_DIR,
                  stdio: 'ignore',
                });
                return true;
              } catch (err) {
                // `make -q` returns 1 for targets that exist but would run, including PHONY targets.
                // Missing targets return 2, which is the only case that should trigger fallback.
                return err.status !== 2;
              }
            }

            function entries(output) {
              return output.trim().split(/[\s,]+/).filter(Boolean);
            }

            function standardRefs(images) {
              const registry = `${process.env.REGION}-docker.pkg.dev/${process.env.PROJECT_ID}/tenant/${process.env.TENANT_NAME}/${stage}`;
              return images.map(img => `${registry}/${img}:${process.env.VERSION}`);
            }

            const inputImages = entries(process.env.IMAGE_NAMES || '');
            let refs;
            if (inputImages.length > 0) {
              refs = standardRefs(inputImages);
            } else if (makeTargetExists('p2p-images')) {
              const images = entries(runMake('p2p-images'));
              refs = standardRefs(images);
            } else {
              refs = [];
            }
            if (refs.length === 0) {
              core.setFailed('Neither image-names nor p2p-images produced any image references; nothing to scan.');
              return;
            }
            core.setOutput('image-refs', refs.join('\n'));
            core.info('Resolved image references:');
            refs.forEach(r => core.info(`  - ${r}`));

      - id: pull-images
        name: Pull images
        if: ${{ inputs.dry-run == false }}
        uses: actions/github-script@v9
        env:
          IMAGE_REFS: ${{ steps.resolve-images.outputs.image-refs }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const refs = process.env.IMAGE_REFS.split('\n').filter(Boolean);
            const listPath = path.join(process.env.RUNNER_TEMP, 'pulled-images.txt');
            fs.writeFileSync(listPath, '');
            core.setOutput('list-path', listPath);
            for (const ref of refs) {
              // One inspect per ref: `{{json .}}` exposes `.manifest.manifests[]` for OCI indexes / Docker manifest
              // lists, and `.manifest.digest` + `.image.{os,architecture,variant}` for single-manifest images.
              let info;
              try {
                const out = execFileSync('docker', ['buildx', 'imagetools', 'inspect', ref, '--format', '{{json .}}'], { encoding: 'utf8' });
                info = JSON.parse(out);
              } catch (err) {
                core.setFailed(`Could not inspect ${ref}: ${err.message}`);
                return;
              }
              let entries;
              if (Array.isArray(info.manifest?.manifests)) {
                entries = info.manifest.manifests
                  .filter(m => m.platform && m.platform.os !== 'unknown' && m.platform.architecture !== 'unknown')
                  .map(m => ({
                    platform: `${m.platform.os}/${m.platform.architecture}` +
                              (m.platform.variant ? `/${m.platform.variant}` : ''),
                    digest: m.digest,
                  }));
              } else {
                const img = info.image;
                if (!img || !img.os || !img.architecture || !info.manifest?.digest) {
                  core.setFailed(`Could not resolve platform/digest for ${ref}.`);
                  return;
                }
                entries = [{
                  platform: `${img.os}/${img.architecture}` + (img.variant ? `/${img.variant}` : ''),
                  digest: info.manifest.digest,
                }];
              }
              if (entries.length === 0) {
                core.setFailed(`Could not enumerate platforms for ${ref}.`);
                return;
              }
              for (const { platform, digest } of entries) {
                core.info(`Pulling ${ref} (${platform}) @ ${digest}`);
                execFileSync('docker', ['pull', '--platform', platform, ref], { stdio: 'inherit' });
                fs.appendFileSync(listPath, `${ref}\t${platform}\t${digest}\n`);
              }
            }

      - name: Install Trivy
        if: ${{ inputs.dry-run == false }}
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.70.0
          cache: true

      - name: Install TruffleHog
        if: ${{ inputs.dry-run == false }}
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.95.3/scripts/install.sh \
            | sh -s -- -b "$RUNNER_TEMP" v3.95.3
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - id: scan
        name: Scan images
        if: ${{ inputs.dry-run == false }}
        uses: actions/github-script@v9
        env:
          PULLED_LIST: ${{ steps.pull-images.outputs.list-path }}
          IGNORE_UNFIXED: ${{ inputs.ignore-unfixed }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');

            const reportsDir = path.join(process.env.RUNNER_TEMP, 'trivy');
            const reportList = path.join(reportsDir, 'reports.txt');
            fs.mkdirSync(reportsDir, { recursive: true });
            fs.writeFileSync(reportList, '');
            core.setOutput('reports-dir', reportsDir);
            core.setOutput('report-list', reportList);

            const sanitize = s => s.replace(/[\/:@]/g, '_');
            const ignoreUnfixed = process.env.IGNORE_UNFIXED === 'true';

            const list = process.env.PULLED_LIST;
            const entries = fs.readFileSync(list, 'utf8').split('\n').filter(Boolean);
            for (const line of entries) {
              const [ref, plat, digest] = line.split('\t');
              const refName = ref.split('@')[0];
              const target = `${refName}@${digest}`;
              const out = path.join(reportsDir, `${sanitize(ref)}-${sanitize(plat)}.json`);
              const args = [
                'image',
                '--format', 'json',
                '--severity', 'LOW,MEDIUM,HIGH,CRITICAL',
                ...(ignoreUnfixed ? ['--ignore-unfixed'] : []),
                '--scanners', 'vuln',
                '--exit-code', '0',
                '--output', out,
                target,
              ];
              core.info(`Scanning ${ref} (${plat}) @ ${digest}`);
              execFileSync('trivy', args, { stdio: 'inherit' });
              fs.appendFileSync(reportList, `${ref}\t${plat}\t${digest}\t${out}\n`);
            }

      - id: secret-scan
        name: Scan images for secrets
        if: ${{ inputs.dry-run == false }}
        uses: actions/github-script@v9
        env:
          PULLED_LIST: ${{ steps.pull-images.outputs.list-path }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { spawnSync } = require('child_process');
            const {
              p2pRedactedSecretId,
            } = require('./.github/scripts/p2p-security-ignore.js');

            const reportsDir = path.join(process.env.RUNNER_TEMP, 'trufflehog-image');
            const reportList = path.join(reportsDir, 'reports.txt');
            fs.mkdirSync(reportsDir, { recursive: true });
            fs.writeFileSync(reportList, '');
            core.setOutput('reports-dir', reportsDir);
            core.setOutput('report-list', reportList);

            const sanitize = s => s.replace(/[\/:@]/g, '_');
            const isRawSecretKey = key => String(key || '').toLowerCase().includes('raw');
            const stripRawSecretFields = value => {
              if (Array.isArray(value)) return value.map(stripRawSecretFields);
              if (!value || typeof value !== 'object') return value;
              const redacted = {};
              for (const [key, item] of Object.entries(value)) {
                if (isRawSecretKey(key)) continue;
                redacted[key] = stripRawSecretFields(item);
              }
              return redacted;
            };
            const redactTruffleHogJsonl = output => (
              String(output || '').split('\n').filter(Boolean).map(line => {
                let finding;
                try {
                  finding = JSON.parse(line);
                } catch {
                  return JSON.stringify({
                    id: p2pRedactedSecretId(line),
                    parseError: true,
                  });
                }
                const id = p2pRedactedSecretId(finding.RawV2 || finding.Raw || finding.Redacted || line);
                return JSON.stringify({ id, ...stripRawSecretFields(finding) });
              }).join('\n')
            );

            const entries = fs.readFileSync(process.env.PULLED_LIST, 'utf8').split('\n').filter(Boolean);
            for (const line of entries) {
              const [ref, plat, digest] = line.split('\t');
              const refName = ref.split('@')[0];
              const target = `docker://${refName}@${digest}`;
              const out = path.join(reportsDir, `${sanitize(ref)}-${sanitize(plat)}.jsonl`);
              core.info(`Scanning ${ref} (${plat}) @ ${digest} for secrets`);
              const proc = spawnSync(
                'trufflehog',
                ['docker', '--image', target, '--fail', '--json', '--no-update'],
                { encoding: 'utf8', maxBuffer: 256 * 1024 * 1024 },
              );
              if (proc.status !== 0 && proc.status !== 183) {
                core.setFailed(`trufflehog exited with ${proc.status}: ${proc.stderr || proc.error?.message || '(no stderr)'}`);
                return;
              }
              const redactedOutput = redactTruffleHogJsonl(proc.stdout || '');
              fs.writeFileSync(out, redactedOutput ? `${redactedOutput}\n` : '');
              fs.appendFileSync(reportList, `${ref}\t${plat}\t${digest}\t${out}\n`);
            }

      - id: manifest
        name: Build image scan manifest
        if: ${{ inputs.dry-run == false }}
        uses: actions/github-script@v9
        env:
          PIPELINE_STAGE: ${{ inputs.pipeline-stage }}
          REPORT_LIST: ${{ steps.scan.outputs.report-list }}
          SECRET_REPORT_LIST: ${{ steps.secret-scan.outputs.report-list }}
          REPORT_ROOT: ${{ steps.scan.outputs.reports-dir }}
          SECRET_REPORT_ROOT: ${{ steps.secret-scan.outputs.reports-dir }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const stage = process.env.PIPELINE_STAGE;
            if (!['fast-feedback', 'extended-test', 'prod'].includes(stage)) {
              core.setFailed(`Unknown pipeline-stage '${stage}'. Expected: fast-feedback|extended-test|prod.`);
              return;
            }

            const artifactRoot = path.join(process.env.RUNNER_TEMP, 'image-scan-artifact');
            const keyFor = (ref, platform, digest) => [ref, platform, digest].join('\u0000');
            const displayPath = file => String(file || '').split(path.sep).join('/');
            const title = kind => kind.charAt(0).toUpperCase() + kind.slice(1);

            function resolveReportPath(reportPath, reportRoot, artifactPrefix, expectedExtension, kind, options = {}) {
              if (!reportPath) {
                core.setFailed(`Missing ${kind} report path.`);
                return null;
              }
              if (!reportRoot || !fs.existsSync(reportRoot)) {
                core.setFailed(`Missing ${kind} report root.`);
                return null;
              }
              const root = path.resolve(reportRoot);
              const resolved = path.resolve(path.isAbsolute(reportPath) ? reportPath : path.join(root, reportPath));
              if (resolved !== root && !resolved.startsWith(`${root}${path.sep}`)) {
                core.setFailed(`${title(kind)} report path must stay inside report root: ${displayPath(reportPath)}`);
                return null;
              }
              const relativePath = path.relative(root, resolved).split(path.sep).join('/');
              if (
                !relativePath
                || path.isAbsolute(relativePath)
                || relativePath === '..'
                || relativePath.startsWith('../')
                || relativePath.split('/').includes('..')
              ) {
                core.setFailed(`${title(kind)} report path must be artifact-relative without parent traversal: ${displayPath(reportPath)}`);
                return null;
              }
              if (!fs.existsSync(resolved)) {
                core.setFailed(`${title(kind)} report path does not exist: ${displayPath(reportPath)}`);
                return null;
              }
              const stat = fs.statSync(resolved);
              if (!stat.isFile()) {
                core.setFailed(`${title(kind)} report path is not a file: ${displayPath(reportPath)}`);
                return null;
              }
              if (stat.size === 0 && !options.allowEmpty) {
                core.setFailed(`${title(kind)} report is empty: ${relativePath}`);
                return null;
              }
              if (!relativePath.endsWith(expectedExtension)) {
                core.setFailed(`${title(kind)} report path must end in ${expectedExtension}: ${relativePath}`);
                return null;
              }
              return {
                sourcePath: resolved,
                artifactPath: `${artifactPrefix}/${relativePath}`,
              };
            }

            function readReportList(listPath, kind, reportRoot, artifactPrefix, expectedExtension, options = {}) {
              if (!listPath || !fs.existsSync(listPath) || fs.statSync(listPath).size === 0) {
                return new Map();
              }
              const reports = new Map();
              for (const line of fs.readFileSync(listPath, 'utf8').split('\n').filter(Boolean)) {
                const fields = line.split('\t');
                if (fields.length !== 4) {
                  core.setFailed(`Malformed ${kind} report list entry: ${line}`);
                  return null;
                }
                const [imageRef, platform, digest, reportPath] = fields;
                if (!imageRef || !platform || !digest || !reportPath) {
                  core.setFailed(`Malformed ${kind} report list entry: ${line}`);
                  return null;
                }
                const key = keyFor(imageRef, platform, digest);
                if (reports.has(key)) {
                  core.setFailed(`Duplicate ${kind} report for ${imageRef} (${platform}) @ ${digest}.`);
                  return null;
                }
                const resolvedReport = resolveReportPath(reportPath, reportRoot, artifactPrefix, expectedExtension, kind, options);
                if (!resolvedReport) return null;
                reports.set(key, { imageRef, platform, digest, ...resolvedReport });
              }
              return reports;
            }

            const vulnerabilityReports = readReportList(
              process.env.REPORT_LIST,
              'vulnerability',
              process.env.REPORT_ROOT,
              'trivy',
              '.json',
            );
            if (!vulnerabilityReports) return;
            const secretReports = readReportList(
              process.env.SECRET_REPORT_LIST,
              'secret',
              process.env.SECRET_REPORT_ROOT,
              'trufflehog-image',
              '.jsonl',
              { allowEmpty: true },
            );
            if (!secretReports) return;

            const reports = [];
            const artifactPaths = new Set();
            function addArtifactPath(file) {
              if (artifactPaths.has(file.artifactPath)) {
                core.setFailed(`Duplicate artifact report path: ${file.artifactPath}`);
                return false;
              }
              artifactPaths.add(file.artifactPath);
              return true;
            }

            for (const vulnReport of vulnerabilityReports.values()) {
              const key = keyFor(vulnReport.imageRef, vulnReport.platform, vulnReport.digest);
              const secretReport = secretReports.get(key);
              if (!secretReport) {
                core.setFailed(`Missing secret report for ${vulnReport.imageRef} (${vulnReport.platform}) @ ${vulnReport.digest}.`);
                return;
              }
              if (!addArtifactPath(vulnReport) || !addArtifactPath(secretReport)) return;
              reports.push({
                imageRef: vulnReport.imageRef,
                platform: vulnReport.platform,
                digest: vulnReport.digest,
                vulnerabilityReport: vulnReport.artifactPath,
                secretReport: secretReport.artifactPath,
              });
            }
            for (const secretReport of secretReports.values()) {
              const key = keyFor(secretReport.imageRef, secretReport.platform, secretReport.digest);
              if (!vulnerabilityReports.has(key)) {
                core.setFailed(`Missing vulnerability report for ${secretReport.imageRef} (${secretReport.platform}) @ ${secretReport.digest}.`);
                return;
              }
            }

            if (reports.length === 0) {
              core.setFailed('No scanned image reports found; cannot build manifest.json.');
              return;
            }

            reports.sort((a, b) => (
              a.imageRef.localeCompare(b.imageRef)
              || a.platform.localeCompare(b.platform)
              || a.digest.localeCompare(b.digest)
            ));

            const manifest = {
              schemaVersion: 1,
              stage,
              reports,
            };
            fs.rmSync(artifactRoot, { recursive: true, force: true });
            fs.mkdirSync(artifactRoot, { recursive: true });
            const copyReport = reportPath => {
              const destination = path.join(artifactRoot, ...reportPath.artifactPath.split('/'));
              fs.mkdirSync(path.dirname(destination), { recursive: true });
              fs.copyFileSync(reportPath.sourcePath, destination);
            };
            for (const vulnReport of vulnerabilityReports.values()) copyReport(vulnReport);
            for (const secretReport of secretReports.values()) copyReport(secretReport);

            const manifestPath = path.join(artifactRoot, 'manifest.json');
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
            core.setOutput('manifest-path', manifestPath);
            core.setOutput('artifact-dir', artifactRoot);
            core.info(`Wrote image scan manifest to ${manifestPath}`);

      - id: report
        name: Build report
        if: always()
        uses: actions/github-script@v9
        env:
          REPORT_LIST: ${{ steps.scan.outputs.report-list }}
          SECRET_REPORT_LIST: ${{ steps.secret-scan.outputs.report-list }}
          BLOCKING_SEVERITY: ${{ inputs.blocking-severity }}
          PIPELINE_STAGE: ${{ inputs.pipeline-stage }}
          GITHUB_ENV_INPUT: ${{ inputs.github_env }}
          VERSION: ${{ inputs.version }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const {
              loadSecurityIgnore,
              splitImageVulnerabilities,
              splitImageSecrets,
              p2pRedactedSecretId,
            } = require('./.github/scripts/p2p-security-ignore.js');
            const CANONICAL_SEVERITIES = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'UNKNOWN'];
            const SEV_RANK = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, UNKNOWN: 4 };
            const SEV_EMOJI = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', UNKNOWN: '⚪' };
            const blockingSeveritySet = value => {
              const threshold = String(value || 'off').trim().toLowerCase();
              const byThreshold = {
                off: [],
                critical: ['CRITICAL'],
                high: ['CRITICAL', 'HIGH'],
                medium: ['CRITICAL', 'HIGH', 'MEDIUM'],
                low: ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'],
              };
              if (!Object.hasOwn(byThreshold, threshold)) {
                core.setFailed(`blocking-severity must be one of: off, low, medium, high, critical. Got: ${value}`);
                return new Set();
              }
              return new Set(byThreshold[threshold]);
            };
            const blockingSet = blockingSeveritySet(process.env.BLOCKING_SEVERITY);
            const reportedSeverities = ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'];
            const list = process.env.REPORT_LIST;
            const listExists = !!(list && fs.existsSync(list) && fs.statSync(list).size > 0);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const securityIgnore = loadSecurityIgnore(process.env.GITHUB_WORKSPACE);

            const escapeCell = (value) => {
              const text = value === undefined || value === null || value === '' ? '-' : String(value);
              return text.replace(/\|/g, '\\|');
            };

            const shortNameFromRef = (ref) => {
              const refWithoutDigest = String(ref || '').split('@')[0];
              const registryPrefix = `${process.env.REGION}-docker.pkg.dev/${process.env.PROJECT_ID}/tenant/${process.env.TENANT_NAME}/${process.env.PIPELINE_STAGE}/`;
              if (
                process.env.REGION
                && process.env.PROJECT_ID
                && process.env.TENANT_NAME
                && refWithoutDigest.startsWith(registryPrefix)
              ) {
                return refWithoutDigest.slice(registryPrefix.length).split(':')[0];
              }
              const segments = refWithoutDigest.split('/').filter(Boolean);
              const stageIndex = segments.lastIndexOf(process.env.PIPELINE_STAGE);
              if (stageIndex >= 0 && stageIndex < segments.length - 1) {
                const imageSegments = segments.slice(stageIndex + 1);
                imageSegments[imageSegments.length - 1] = imageSegments[imageSegments.length - 1].split(':')[0];
                return imageSegments.join('/');
              }
              return refWithoutDigest.split('/').pop().split(':')[0];
            };

            const sourceFromTarget = (target) => {
              const text = String(target || '');
              const match = text.match(/^.+\((.+)\)$/);
              return match ? match[1] : text;
            };

            const rowSort = (a, b) => (
              (SEV_RANK[a.severity] ?? SEV_RANK.UNKNOWN) - (SEV_RANK[b.severity] ?? SEV_RANK.UNKNOWN)
              || a.package.localeCompare(b.package)
              || a.cve.localeCompare(b.cve)
            );

            let total = 0;
            let blocking = 0;
            const imageGroups = {};
            const ignoredImageVulnerabilities = [];

            if (listExists) {
              const entries = fs.readFileSync(list, 'utf8').split('\n').filter(Boolean);
              for (const line of entries) {
                const [ref, plat, digest, out] = line.split('\t');
                if (!out || !fs.existsSync(out) || fs.statSync(out).size === 0) continue;
                try {
                  const shortName = shortNameFromRef(ref);
                  if (!imageGroups[shortName]) {
                    imageGroups[shortName] = {
                      shortName,
                      fullRef: ref,
                      platforms: new Set(),
                      rawRows: [],
                    };
                  }
                  const group = imageGroups[shortName];
                  if (!group.fullRef) group.fullRef = ref;
                  if (plat) group.platforms.add(plat);

                  const report = JSON.parse(fs.readFileSync(out, 'utf8'));
                  const results = Array.isArray(report.Results) ? report.Results : [];
                  for (const res of results) {
                    const source = sourceFromTarget(res?.Target) || '-';
                    const vulns = Array.isArray(res?.Vulnerabilities) ? res.Vulnerabilities : [];
                    for (const v of vulns) {
                      const severity = CANONICAL_SEVERITIES.includes(v.Severity) ? v.Severity : 'UNKNOWN';
                      const cve = v.VulnerabilityID || 'UNKNOWN';
                      group.rawRows.push({
                        severity,
                        package: v.PkgName || '-',
                        installed: v.InstalledVersion || '-',
                        fixed: v.FixedVersion || '-',
                        id: cve,
                        cveUrl: v.PrimaryURL || `https://avd.aquasec.com/nvd/${cve}`,
                        source,
                      });
                    }
                  }
                } catch (error) {
                  core.warning(`Failed to process Trivy report for ${ref} (${plat}): ${error.message}`);
                }
              }
            }

            for (const group of Object.values(imageGroups)) {
              const split = splitImageVulnerabilities(group.rawRows, securityIgnore, group.shortName);
              group.rawRows = split.active;
              ignoredImageVulnerabilities.push(
                ...split.ignored.map(row => ({ ...row, image: group.shortName, fullRef: group.fullRef })),
              );
              total += split.active.length;
              blocking += split.active.filter(row => blockingSet.has(row.severity)).length;
            }

            const secretList = process.env.SECRET_REPORT_LIST;
            const secretListExists = !!(secretList && fs.existsSync(secretList) && fs.statSync(secretList).size > 0);
            const secretImageGroups = {};
            const ignoredImageSecrets = [];
            let secretTotal = 0;
            let secretBlocking = 0;
            if (secretListExists) {
              for (const line of fs.readFileSync(secretList, 'utf8').split('\n').filter(Boolean)) {
                // Four tab-separated fields: original ref, platform, manifest digest, output path.
                const [ref, plat, digest, out] = line.split('\t');
                if (!out || !fs.existsSync(out)) continue;
                const shortName = shortNameFromRef(ref);
                if (!secretImageGroups[shortName]) {
                  secretImageGroups[shortName] = { shortName, fullRef: ref, platforms: new Set(), rawRows: [] };
                }
                const group = secretImageGroups[shortName];
                if (plat) group.platforms.add(plat);
                for (const ln of fs.readFileSync(out, 'utf8').split('\n').filter(Boolean)) {
                  let f;
                  try { f = JSON.parse(ln); } catch (e) { continue; }
                  const detector = f.DetectorName || f.DetectorType || 'unknown';
                  const verified = f.Verified === true;
                  const status = verified ? 'verified' : (f.VerificationError ? 'unknown' : 'unverified');
                  const meta = (f.SourceMetadata && f.SourceMetadata.Data && f.SourceMetadata.Data.Docker) || {};
                  const isBlocking = verified && blockingSet.has('CRITICAL');
                  group.rawRows.push({
                    id: f.id || p2pRedactedSecretId(f.RawV2 || f.Raw || f.Redacted || `${detector}:${meta.file || '-'}:${meta.layer || '-'}`),
                    detector,
                    status,
                    layer: meta.layer || '-',
                    path: meta.file || '-',
                    isBlocking,
                    blocking: isBlocking,
                  });
                }
              }
            }

            for (const group of Object.values(secretImageGroups)) {
              const split = splitImageSecrets(group.rawRows, securityIgnore, group.shortName);
              group.rawRows = split.active;
              ignoredImageSecrets.push(
                ...split.ignored.map(row => ({ ...row, isBlocking: false, image: group.shortName, fullRef: group.fullRef })),
              );
              secretTotal += split.active.length;
              secretBlocking += split.active.filter(row => row.isBlocking).length;
            }

            const imageSummaries = Object.values(imageGroups)
              .map(group => {
                const dedup = new Map();
                for (const rawRow of group.rawRows) {
                  const key = [rawRow.severity, rawRow.installed, rawRow.fixed, rawRow.id, rawRow.source].join('\u0000');
                  if (!dedup.has(key)) {
                    dedup.set(key, {
                      severity: rawRow.severity,
                      installed: rawRow.installed,
                      fixed: rawRow.fixed,
                      cve: rawRow.id,
                      cveUrl: rawRow.cveUrl,
                      source: rawRow.source,
                      packages: [],
                      packageSet: new Set(),
                      isBlocking: blockingSet.has(rawRow.severity),
                      shortName: group.shortName,
                    });
                  }
                  const row = dedup.get(key);
                  if (!row.packageSet.has(rawRow.package)) {
                    row.packageSet.add(rawRow.package);
                    row.packages.push(rawRow.package);
                  }
                }

                const rows = Array.from(dedup.values())
                  .map(row => ({
                    severity: row.severity,
                    package: row.packages.join(', '),
                    installed: row.installed,
                    fixed: row.fixed,
                    cve: row.cve,
                    cveUrl: row.cveUrl,
                    source: row.source,
                    isBlocking: row.isBlocking,
                    shortName: row.shortName,
                  }))
                  .sort(rowSort);

                const countsBySeverity = Object.fromEntries(CANONICAL_SEVERITIES.map(sev => [sev, 0]));
                for (const row of rows) countsBySeverity[row.severity] += 1;

                return {
                  shortName: group.shortName,
                  fullRef: group.fullRef,
                  platforms: Array.from(group.platforms).sort((a, b) => a.localeCompare(b)),
                  rows,
                  countsBySeverity,
                  blockingUnique: rows.filter(row => row.isBlocking).length,
                  totalUnique: rows.length,
                };
              })
              .filter(group => group.totalUnique > 0)
              .sort((a, b) => (
                b.blockingUnique - a.blockingUnique
                || b.totalUnique - a.totalUnique
                || a.shortName.localeCompare(b.shortName)
              ));

            const allUniqueRows = imageSummaries.flatMap(group => group.rows.map(row => ({ ...row, shortName: group.shortName })));
            const totalUniqueRows = allUniqueRows.length;
            const selectedRows = [
              ...allUniqueRows.filter(row => row.isBlocking),
              ...allUniqueRows.filter(row => !row.isBlocking),
            ].slice(0, 100);
            const selectedRowsByImage = new Map();
            for (const row of selectedRows) {
              const rows = selectedRowsByImage.get(row.shortName) || [];
              rows.push(row);
              selectedRowsByImage.set(row.shortName, rows);
            }
            for (const rows of selectedRowsByImage.values()) rows.sort(rowSort);

            const secretRowSort = (a, b) => (
              Number(b.isBlocking) - Number(a.isBlocking)
              || a.detector.localeCompare(b.detector)
              || a.path.localeCompare(b.path)
            );
            const secretSummaries = Object.values(secretImageGroups)
              .map(group => {
                const dedup = new Map();
                for (const rawRow of group.rawRows) {
                  const key = [rawRow.id, rawRow.detector, rawRow.status, rawRow.layer, rawRow.path].join('\u0000');
                  if (!dedup.has(key)) dedup.set(key, { ...rawRow, shortName: group.shortName });
                }
                const rows = Array.from(dedup.values()).sort(secretRowSort);
                return {
                  shortName: group.shortName,
                  platforms: Array.from(group.platforms).sort((a, b) => a.localeCompare(b)),
                  rows,
                  blockingUnique: rows.filter(r => r.isBlocking).length,
                  totalUnique: rows.length,
                };
              })
              .filter(group => group.totalUnique > 0)
              .sort((a, b) => (
                b.blockingUnique - a.blockingUnique
                || b.totalUnique - a.totalUnique
                || a.shortName.localeCompare(b.shortName)
              ));

            const allSecretRows = secretSummaries.flatMap(group => group.rows);
            const totalSecretUnique = allSecretRows.length;
            const selectedSecretRows = [
              ...allSecretRows.filter(r => r.isBlocking),
              ...allSecretRows.filter(r => !r.isBlocking),
            ].slice(0, 100);
            const selectedSecretsByImage = new Map();
            for (const row of selectedSecretRows) {
              const arr = selectedSecretsByImage.get(row.shortName) || [];
              arr.push(row);
              selectedSecretsByImage.set(row.shortName, arr);
            }
            for (const arr of selectedSecretsByImage.values()) arr.sort(secretRowSort);

            const envSuffix = process.env.GITHUB_ENV_INPUT ? ` / ${process.env.GITHUB_ENV_INPUT}` : '';
            const out = [`## Image scan (${process.env.PIPELINE_STAGE}${envSuffix})`];

            if (!listExists && !secretListExists) {
              out.push('', '_Scan skipped (dry-run or upstream failure)._');
            } else if (total === 0 && secretTotal === 0 && ignoredImageVulnerabilities.length === 0 && ignoredImageSecrets.length === 0) {
              out.push(
                '',
                `**Version:** \`${process.env.VERSION}\` · **Vulnerabilities:** 0 · **Secrets:** 0`,
                '',
                '_No vulnerabilities or secrets found._',
              );
            } else {
              out.push(
                '',
                `**Version:** \`${process.env.VERSION}\` · **Vulnerabilities:** ${total} total · ${blocking} blocking`,
                `· **Secrets:** ${secretTotal} total · ${secretBlocking} blocking`,
                ...(securityIgnore.present ? [`· **Ignored:** ${ignoredImageVulnerabilities.length + ignoredImageSecrets.length} image finding(s)`] : []),
                `**Severities reported:** \`LOW,MEDIUM,HIGH,CRITICAL\` · **Blocking severity:** \`${process.env.BLOCKING_SEVERITY}\``,
                '',
                `[📦 Download full reports](${runUrl})`,
                '',
              );

              if (total > 0) {
                out.push('### Vulnerabilities', '');
                if (imageSummaries.length > 0) {
                  const summaryHeader = [
                    'Image',
                    ...reportedSeverities.map(sev => `${SEV_EMOJI[sev]} ${sev}`),
                    'Total',
                  ];
                  out.push(
                    `| ${summaryHeader.join(' | ')} |`,
                    `| ${summaryHeader.map(() => '---').join(' | ')} |`,
                    ...imageSummaries.map(group => {
                      const counts = reportedSeverities.map(sev => String(group.countsBySeverity[sev] || 0));
                      return `| \`${escapeCell(group.shortName)}\` | ${[...counts, String(group.totalUnique)].join(' | ')} |`;
                    }),
                    '',
                  );
                }

                for (const group of imageSummaries) {
                  const rows = selectedRowsByImage.get(group.shortName) || [];
                  if (rows.length === 0) continue;

                  const sevSummary = reportedSeverities
                    .map(sev => `${SEV_EMOJI[sev]} ${group.countsBySeverity[sev] || 0}`)
                    .join(' · ');
                  const platformSuffix = group.platforms.length > 0 ? ` (${group.platforms.join(', ')})` : '';

                  out.push(
                    `<details><summary>${sevSummary} — <code>${group.shortName}</code>${platformSuffix}</summary>`,
                    '',
                    '| Severity | Package | Installed | Fixed | CVE | Source |',
                    '|---|---|---|---|---|---|',
                    ...rows.map(row => `| ${SEV_EMOJI[row.severity]} ${row.severity} | ${escapeCell(row.package)} | ${escapeCell(row.installed)} | ${escapeCell(row.fixed)} | [${row.cve}](${row.cveUrl}) | ${escapeCell(row.source)} |`),
                    '',
                    `Full ref: \`${group.fullRef}\``,
                    '',
                    '</details>',
                    '',
                  );
                }

                if (totalUniqueRows > 100) {
                  out.push(`_Showing 100 of ${totalUniqueRows} findings — see the [full Trivy reports](${runUrl}) for the rest._`);
                }
              }

              if (secretTotal > 0) {
                out.push('### Secrets in image', '');
                for (const group of secretSummaries) {
                  const rows = selectedSecretsByImage.get(group.shortName) || [];
                  if (rows.length === 0) continue;
                  const platformSuffix = group.platforms.length > 0 ? ` (${group.platforms.join(', ')})` : '';
                  out.push(
                    `**\`${group.shortName}\`**${platformSuffix}`,
                    '',
                    '| Detector | Status | ID | Layer | Path |',
                    '|---|---|---|---|---|',
                    ...rows.map(r => `| ${escapeCell(r.detector)} | ${r.status} | \`${escapeCell(r.id)}\` | \`${escapeCell(r.layer)}\` | ${escapeCell(r.path)} |`),
                    '',
                  );
                }
                if (totalSecretUnique > 100) {
                  out.push(`_Showing 100 of ${totalSecretUnique} secret findings — see the [full reports](${runUrl}) for the rest._`, '');
                }
              }

              if (ignoredImageVulnerabilities.length > 0 || ignoredImageSecrets.length > 0) {
                out.push('### Ignored image findings', '');
                if (ignoredImageVulnerabilities.length > 0) {
                  out.push(
                    '#### Ignored vulnerabilities',
                    '',
                    '| Image | Severity | Package | CVE | Source | Reason | Expires |',
                    '|---|---|---|---|---|---|---|',
                    ...ignoredImageVulnerabilities.slice(0, 100).map(row => `| \`${escapeCell(row.image)}\` | ${SEV_EMOJI[row.severity]} ${row.severity} | ${escapeCell(row.package)} | [${escapeCell(row.id)}](${row.cveUrl}) | ${escapeCell(row.source)} | ${escapeCell(row.ignore.reason)} | ${escapeCell(row.ignore.expires)} |`),
                    '',
                  );
                }
                if (ignoredImageSecrets.length > 0) {
                  out.push(
                    '#### Ignored secrets',
                    '',
                    '| Image | Detector | Status | ID | Path | Reason | Expires |',
                    '|---|---|---|---|---|---|---|',
                    ...ignoredImageSecrets.slice(0, 100).map(row => `| \`${escapeCell(row.image)}\` | ${escapeCell(row.detector)} | ${escapeCell(row.status)} | \`${escapeCell(row.id)}\` | ${escapeCell(row.path)} | ${escapeCell(row.ignore.reason)} | ${escapeCell(row.ignore.expires)} |`),
                    '',
                  );
                }
              }
            }

            const md = out.join('\n').trimEnd() + '\n';
            const reportPath = path.join(process.env.RUNNER_TEMP, 'trivy-report.md');
            const jsonPath = path.join(process.env.RUNNER_TEMP, 'image-security-findings.json');
            const normalized = {
              vulnerabilities: imageSummaries.flatMap(group => group.rows.map(row => ({ ...row, image: group.shortName, id: row.cve }))),
              secrets: secretSummaries.flatMap(group => group.rows.map(row => ({ ...row, image: group.shortName }))),
            };
            if (securityIgnore.present) {
              normalized.ignored = {
                vulnerabilities: ignoredImageVulnerabilities,
                secrets: ignoredImageSecrets,
              };
            }
            fs.writeFileSync(reportPath, md);
            fs.writeFileSync(jsonPath, JSON.stringify(normalized, null, 2) + '\n');
            core.setOutput('report-path', reportPath);
            core.setOutput('comment-path', reportPath);
            core.setOutput('json-file', jsonPath);
            core.setOutput('total-count', total);
            core.setOutput('blocking-count', blocking);
            core.setOutput('secret-total-count', secretTotal);
            core.setOutput('secret-blocking-count', secretBlocking);
            await core.summary.addRaw(md).write();

      - name: Post sticky PR comment
        if: ${{ always() && github.event_name == 'pull_request' && inputs.dry-run == false }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: image-scan-findings-${{ inputs.pipeline-stage }}-${{ inputs.github_env || 'local' }}
          path: ${{ steps.report.outputs.comment-path }}
          recreate: true

      - name: Upload image-scan reports
        if: ${{ inputs.dry-run == false && steps.manifest.outputs.artifact-dir != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: image-scan-reports-${{ inputs.pipeline-stage }}-${{ inputs.github_env || 'local' }}
          path: |
            ${{ steps.manifest.outputs.artifact-dir }}
            ${{ steps.report.outputs.json-file }}
          if-no-files-found: error
          retention-days: 30

  policy:
    name: image-scan-policy (${{ inputs.github_env != '' && format('{0}, {1}', inputs.pipeline-stage, inputs.github_env) || inputs.pipeline-stage }})
    runs-on: ubuntu-24.04
    needs: [image-scan]
    if: ${{ always() && inputs.dry-run == false }}
    continue-on-error: ${{ inputs.blocking-severity == 'off' }}
    timeout-minutes: 1
    steps:
      - name: Enforce policy
        shell: bash
        env:
          BLOCKING_SEVERITY: ${{ inputs.blocking-severity }}
          BLOCKING: ${{ needs.image-scan.outputs.blocking-count }}
          TOTAL: ${{ needs.image-scan.outputs.total-count }}
          SECRET_BLOCKING: ${{ needs.image-scan.outputs.secret-blocking-count }}
          SECRET_TOTAL: ${{ needs.image-scan.outputs.secret-total-count }}
        run: |
          set -euo pipefail
          case "${BLOCKING_SEVERITY}" in
            off|low|medium|high|critical) ;;
            *)
              echo "::error::blocking-severity must be one of: off, low, medium, high, critical. Got: ${BLOCKING_SEVERITY}"
              exit 1
              ;;
          esac
          echo "Trivy: total=${TOTAL:-0}, blocking=${BLOCKING:-0}"
          echo "TruffleHog: total=${SECRET_TOTAL:-0}, blocking=${SECRET_BLOCKING:-0}"
          echo "blocking-severity=${BLOCKING_SEVERITY}"
          if [ "${BLOCKING_SEVERITY}" = "off" ]; then
            if [ "${TOTAL:-0}" -gt 0 ] || [ "${SECRET_TOTAL:-0}" -gt 0 ]; then
              echo "::error::Security finding(s) detected. blocking-severity=off, so this policy job is allowed to fail without failing the workflow."
              exit 1
            fi
          elif [ "${BLOCKING:-0}" -gt 0 ] || [ "${SECRET_BLOCKING:-0}" -gt 0 ]; then
            echo "::error::Security finding(s) at or above blocking-severity=${BLOCKING_SEVERITY} detected."
            exit 1
          fi
