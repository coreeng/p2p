on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
      slack_webhook_url:
        required: false
    inputs:
      source:
        required: false
        type: string
        default: ${{ vars.EXTENDED_TEST }}
      destination:
        required: false
        type: string
        default: ${{ vars.PROD }}
      dry-run:
        required: false
        type: boolean
        default: false
      security-scan-blocking-severity:
        description: |
          Minimum severity that blocks the workflow for security-image-scan findings:
          off, low, medium, high, or critical.
        required: false
        type: string
        default: off
      security-scan-enabled:
        description: 'Run managed image security scans.'
        required: false
        type: boolean
        default: true
      security-scan-fail-on-non-blocking-findings:
        description: 'Fail security policy jobs for non-blocking findings for GitHub UI visibility.'
        required: false
        type: boolean
        default: false
      region:
        required: false
        type: string
        default: europe-west2
      main-branch:
        required: false
        type: string
        default: 'refs/heads/main'
      working-directory:
        required: false
        type: string
        default: '.'
      app-name:
        required: false
        type: string
        default: ''
      tenant-name:
        required: false
        type: string
        default: ''
      version:
        required: true
        type: string
      version-prefix:
        required: false
        type: string
        default: 'v'
      skip-subnamespaces-create:
        description: |
          Skip creating subnamespaces
        required: false
        type: boolean
        default: false
      artifacts:
        required: false
        type: string
        default: ''

jobs:
  run-tests:
    uses: ./.github/workflows/p2p-execute-command.yaml
    if: success() && (github.ref == inputs.main-branch )
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(inputs.source ) }}
      fail-fast: false
    with:
      command: p2p-extended-test
      subnamespace: extended
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}

  security-image-scan:
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    if: success() && (github.ref == inputs.main-branch)
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    strategy:
      matrix: ${{ fromJSON(inputs.source) }}
      fail-fast: false
    with:
      pipeline-stage: extended-test
      github_env: ${{ matrix.deploy_env }}
      tenant-name: ${{ inputs.tenant-name }}
      app-name: ${{ inputs.app-name }}
      version: ${{ inputs.version }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}
      blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
      fail-on-non-blocking-findings: ${{ inputs.security-scan-fail-on-non-blocking-findings }}

  promote:
    uses: ./.github/workflows/p2p-promote-image.yaml
    if: success() && (github.ref == inputs.main-branch)
    needs: [run-tests, security-image-scan]
    secrets:
      env_vars: ${{ secrets.env_vars }}
    strategy:
      matrix: ${{ fromJSON(inputs.destination) }}
      fail-fast: false
    with:
      source_matrix: ${{ inputs.source }}
      dest_github_env: ${{ matrix.deploy_env }}
      region: ${{ inputs.region }}
      promotion-stage: prod
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version  }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}

  notify-failure:
    needs: [run-tests, security-image-scan, promote]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "❌ P2P extended-test failed: *${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}* @ *${{ inputs.version }}*"
            app_name: "${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}"
            version: "${{ inputs.version }}"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
