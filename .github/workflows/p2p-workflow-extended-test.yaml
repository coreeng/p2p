on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
      slack_webhook_url:
        required: false
      central_repo_token:
        required: false
    inputs:
      source:
        required: false
        type: string
        default: ${{ vars.EXTENDED_TEST }}
      destination:
        required: false
        type: string
        default: ${{ vars.PROD }}
      dry-run:
        required: false
        type: boolean
        default: false
      region:
        required: false
        type: string
        default: europe-west2
      main-branch:
        required: false
        type: string
        default: 'refs/heads/main'
      working-directory:
        required: false
        type: string
        default: '.'
      app-name:
        required: false
        type: string
        default: ''
      tenant-name:
        required: false
        type: string
        default: ''
      version:
        required: true
        type: string
      version-prefix:
        required: false
        type: string
        default: 'v'
      skip-subnamespaces-create:
        description: |
          Skip creating subnamespaces
        required: false
        type: boolean
        default: false
      artifacts:
        required: false
        type: string
        default: ''
      config-mode:
        description: 'Config source: github-env, repo-file, or central-repo'
        required: false
        type: string
        default: ''
      repo-file-path:
        description: 'Path to tenant repo config file (e.g. .p2p.yaml)'
        required: false
        type: string
        default: ''
      central-repo-name:
        description: 'Central config repo name'
        required: false
        type: string
        default: ''
      central-repo-owner:
        description: 'Central config repo owner'
        required: false
        type: string
        default: ''
      central-repo-path-pattern:
        description: 'Path pattern in central repo ({env} replaced with environment name)'
        required: false
        type: string
        default: 'environments/{env}/config.yaml'

jobs:
  run-tests:
    uses: ./.github/workflows/p2p-execute-command.yaml
    if: success() && (github.ref == inputs.main-branch )
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.source, '{') && inputs.source || format('{"include":[{"deploy_env":"{0}"}]}', inputs.source)) }}
      fail-fast: false
    with:
      command: p2p-extended-test
      subnamespace: extended
      region: ${{ inputs.region }}
      github_env: ${{ matrix.deploy_env }}
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}
      skip-subnamespaces-create: ${{ inputs.skip-subnamespaces-create }}
      artifacts: ${{ inputs.artifacts }}
      config-mode: ${{ inputs.config-mode }}
      repo-file-path: ${{ inputs.repo-file-path }}
      central-repo-name: ${{ inputs.central-repo-name }}
      central-repo-owner: ${{ inputs.central-repo-owner }}
      central-repo-path-pattern: ${{ inputs.central-repo-path-pattern }}
      central-repo-token: ${{ secrets.central_repo_token }}

  promote:
    uses: ./.github/workflows/p2p-promote-image.yaml
    if: success() && (github.ref == inputs.main-branch)
    needs: [run-tests]
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.destination, '{') && inputs.destination || format('{"include":[{"deploy_env":"{0}"}]}', inputs.destination)) }}
      fail-fast: false
    with:
      source_matrix: ${{ inputs.source }}
      dest_github_env: ${{ matrix.deploy_env }}
      region: ${{ inputs.region }}
      promotion-stage: prod
      app-name: ${{ inputs.app-name }}
      tenant-name: ${{ inputs.tenant-name }}
      version: ${{ inputs.version  }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      checkout-version: ${{ inputs.version-prefix }}${{ inputs.version }}
      config-mode: ${{ inputs.config-mode }}
      repo-file-path: ${{ inputs.repo-file-path }}
      central-repo-name: ${{ inputs.central-repo-name }}
      central-repo-owner: ${{ inputs.central-repo-owner }}
      central-repo-path-pattern: ${{ inputs.central-repo-path-pattern }}
      central-repo-token: ${{ secrets.central_repo_token }}

  notify-failure:
    needs: [run-tests, promote]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "❌ P2P extended-test failed: *${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}* @ *${{ inputs.version }}*"
            app_name: "${{ inputs.app-name != '' && inputs.app-name || github.event.repository.name }}"
            version: "${{ inputs.version }}"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
