on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      slack_webhook_url:
        required: false
    outputs:
      version:
        description: "The latest image in the registry"
        value: ${{ jobs.get-latest-version.outputs.version }}
    inputs:
      environment:
        required: false
        type: string
        default: ${{ vars.PROD }}
      dry-run:
        required: false
        type: boolean
        default: false
      main-branch:
        required: false
        type: string
        default: 'refs/heads/main'
      working-directory:
        required: false
        type: string
        default: '.'
      registry-path:
        required: false
        type: string
        default: 'prod'
      tenant-name:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      region:
        required: false
        type: string
        default: europe-west2
      config-mode:
        description: 'Config source: github-env, repo-file, or central-repo'
        required: false
        type: string
        default: ''
      repo-file-path:
        description: 'Path to tenant repo config file (e.g. .p2p.yaml)'
        required: false
        type: string
        default: ''
      central-repo-name:
        description: 'Central config repo name'
        required: false
        type: string
        default: ''
      central-repo-owner:
        description: 'Central config repo owner'
        required: false
        type: string
        default: ''
      central-repo-path-pattern:
        description: 'Path pattern in central repo ({env} replaced with environment name)'
        required: false
        type: string
        default: 'environments/{env}/config.yaml'

jobs:
  get-latest-version:
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    if: success() && (github.ref == inputs.main-branch )
    secrets: inherit
    strategy:
      matrix: ${{ fromJSON(startsWith(inputs.environment, '{') && inputs.environment || format('{"include":[{"deploy_env":"{0}"}]}', inputs.environment)) }}
      fail-fast: false
    with:
      environment: ${{ inputs.environment }}
      registry-path: ${{ inputs.registry-path }}
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ inputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      working-directory: ${{ inputs.working-directory }}
      region: ${{ inputs.region }}
      config-mode: ${{ inputs.config-mode }}
      repo-file-path: ${{ inputs.repo-file-path }}
      central-repo-name: ${{ inputs.central-repo-name }}
      central-repo-owner: ${{ inputs.central-repo-owner }}
      central-repo-path-pattern: ${{ inputs.central-repo-path-pattern }}

  notify-failure:
    needs: [get-latest-version]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: always() && github.ref == inputs.main-branch && contains(needs.*.result, 'failure')

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}

    steps:
      - id: slack-alert
        name: Slack alert
        uses: slackapi/slack-github-action@v2
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            notification: "P2P get-latest-image (prod) failed"
            workflow_link: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
