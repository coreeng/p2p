on:
  workflow_call:
    secrets:
      env_vars:
        required: false
      container_registry_user:
        required: false
      container_registry_pat:
        required: false
      container_registry_url:
        required: false
    inputs:
      registry-path:
        required: true
        type: string
      pipeline-stage:
        required: true
        type: string
      github_env:
        required: true
        type: string
      tenant-name:
        required: false
        type: string
        default: ''
      app-name:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      image-names:
        required: false
        type: string
        default: ''
      working-directory:
        required: false
        type: string
        default: '.'
      region:
        required: false
        type: string
        default: europe-west2
      dry-run:
        required: false
        type: boolean
        default: false
      checkout-version:
        required: false
        type: string
        default: ''
      security-scan-blocking-severity:
        description: |
          Minimum severity that blocks the workflow for security-image-scan findings:
          off, low, medium, high, or critical.
        required: false
        type: string
        default: 'off'
      security-scan-enabled:
        description: 'Run managed image security scans.'
        required: false
        type: boolean
        default: true

jobs:
  security-image-scan-disabled:
    name: security-image-scan-disabled (${{ inputs.pipeline-stage }}, ${{ inputs.github_env }})
    if: ${{ inputs.security-scan-enabled == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Report disabled scan
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Image scan disabled

          Managed image security scanning is disabled by security-scan-enabled=false.
          EOF

  security-discover-version:
    if: inputs.security-scan-enabled
    uses: ./.github/workflows/p2p-get-latest-image.yaml
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
    with:
      registry-path: ${{ inputs.registry-path }}
      tenant-name: ${{ inputs.tenant-name }}
      image-name: ${{ inputs.image-name }}
      dry-run: ${{ inputs.dry-run }}
      region: ${{ inputs.region }}
      github_env: ${{ inputs.github_env }}
      working-directory: ${{ inputs.working-directory }}

  security-image-scan:
    needs: [security-discover-version]
    if: needs.security-discover-version.outputs.found == 'true'
    uses: ./.github/workflows/p2p-workflow-image-scan.yaml
    permissions:
      contents: read
      id-token: write
    secrets:
      env_vars: ${{ secrets.env_vars }}
      container_registry_user: ${{ secrets.container_registry_user }}
      container_registry_pat: ${{ secrets.container_registry_pat }}
      container_registry_url: ${{ secrets.container_registry_url }}
    with:
      pipeline-stage: ${{ inputs.pipeline-stage }}
      github_env: ${{ inputs.github_env }}
      tenant-name: ${{ inputs.tenant-name }}
      app-name: ${{ inputs.app-name }}
      version: ${{ needs.security-discover-version.outputs.version }}
      region: ${{ inputs.region }}
      working-directory: ${{ inputs.working-directory }}
      image-names: ${{ inputs.image-names }}
      dry-run: ${{ inputs.dry-run }}
      checkout-version: ${{ inputs.checkout-version }}
      blocking-severity: ${{ inputs.security-scan-blocking-severity }}
      security-scan-enabled: ${{ inputs.security-scan-enabled }}
